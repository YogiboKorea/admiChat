<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요기보 추천 테스트 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8f4ff 0%, #e8f4fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== 헤더 ===== */
        .top-bar {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #ede9fe;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 18px; font-weight: 800; color: #5b21b6; letter-spacing: -0.5px; }
        .logo span { color: #f59e0b; }
        .progress-text { font-size: 12px; color: #94a3b8; font-weight: 600; }

        /* 진행 바 */
        .progress-bar-wrap { width: 100%; height: 4px; background: #ede9fe; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #f59e0b); transition: width 0.4s ease; }

        /* ===== 메인 컨테이너 ===== */
        .container { width: 100%; max-width: 600px; padding: 32px 16px 60px; }

        /* ===== 화면 전환 ===== */
        .screen { display: none; animation: fadeSlide 0.35s ease; }
        .screen.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== 시작 화면 ===== */
        .start-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(91,33,182,0.1);
        }
        .start-emoji { font-size: 64px; margin-bottom: 16px; }
        .start-title { font-size: 26px; font-weight: 800; color: #1e293b; line-height: 1.3; margin-bottom: 12px; }
        .start-desc { font-size: 14px; color: #64748b; line-height: 1.7; margin-bottom: 32px; }
        .btn-start {
            display: block; width: 100%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff; font-size: 16px; font-weight: 700;
            padding: 18px; border-radius: 14px; border: none; cursor: pointer;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,58,237,0.5); }

        /* ===== 질문 카드 ===== */
        .q-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(91,33,182,0.08);
        }
        .q-step { font-size: 11px; font-weight: 700; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
        .q-title { font-size: 20px; font-weight: 800; color: #1e293b; line-height: 1.4; margin-bottom: 8px; }
        .q-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }

        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 18px;
            border: 2px solid #ede9fe;
            border-radius: 14px;
            background: #faf8ff;
            cursor: pointer;
            font-size: 15px; font-weight: 600; color: #374151;
            transition: all 0.18s;
            text-align: left;
        }
        .choice-btn:hover { border-color: #a78bfa; background: #f3e8ff; color: #5b21b6; transform: translateX(3px); }
        .choice-emoji { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }

        /* 2열 그리드 선택지 */
        .choices.grid { flex-direction: row; flex-wrap: wrap; }
        .choices.grid .choice-btn { flex: 1 1 calc(50% - 5px); min-width: 140px; }

        /* ===== 이동경로 확인 화면 ===== */
        .path-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(91,33,182,0.08);
            margin-bottom: 20px;
        }
        .path-title { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .path-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .path-list { display: flex; flex-direction: column; gap: 0; }
        .path-item {
            display: flex; gap: 16px; align-items: flex-start; padding: 14px 0;
            border-bottom: 1px solid #f1f5f9; position: relative;
        }
        .path-item:last-child { border-bottom: none; }
        .path-dot {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff; font-size: 12px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .path-info { flex: 1; }
        .path-q { font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 3px; }
        .path-a { font-size: 15px; font-weight: 700; color: #1e293b; }

        .btn-see-result {
            display: block; width: 100%;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #fff; font-size: 16px; font-weight: 700;
            padding: 18px; border-radius: 14px; border: none; cursor: pointer;
            box-shadow: 0 4px 20px rgba(245,158,11,0.4);
            transition: transform 0.15s;
        }
        .btn-see-result:hover { transform: translateY(-2px); }

        /* ===== 결과 화면 ===== */
        .result-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(91,33,182,0.1);
            margin-bottom: 20px;
        }
        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff; font-size: 12px; font-weight: 700;
            padding: 5px 16px; border-radius: 20px; margin-bottom: 16px;
        }
        .result-emoji { font-size: 56px; margin-bottom: 12px; }
        .result-name { font-size: 26px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
        .result-desc { font-size: 14px; color: #64748b; line-height: 1.8; margin-bottom: 8px; }

        /* 응모 폼 */
        .apply-card {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 40px rgba(91,33,182,0.08);
        }
        .apply-title { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
        .apply-sub { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .form-group input {
            width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px;
            padding: 12px 14px; font-size: 14px; font-family: inherit;
            background: #f9fafb; transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #a78bfa; background: #fff; }
        .btn-apply {
            display: block; width: 100%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff; font-size: 15px; font-weight: 700;
            padding: 16px; border-radius: 12px; border: none; cursor: pointer;
            transition: transform 0.15s;
        }
        .btn-apply:hover { transform: translateY(-2px); }
        .already-applied {
            text-align: center; padding: 20px;
            background: #f0fdf4; border-radius: 14px; color: #16a34a; font-weight: 700; font-size: 15px;
        }

        /* ===== 재시작 버튼 ===== */
        .btn-restart {
            display: block; width: 100%; margin-top: 12px;
            background: transparent; border: 1.5px solid #d1d5db; color: #6b7280;
            font-size: 14px; font-weight: 600; padding: 14px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-restart:hover { border-color: #7c3aed; color: #7c3aed; }

        @media (max-width: 480px) {
            .q-card, .start-card, .result-card, .path-card, .apply-card { border-radius: 18px; padding: 24px 20px; }
            .q-title { font-size: 18px; }
            .choices.grid .choice-btn { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">YOGIBO<span>.</span></div>
    <div class="progress-text" id="progress-text"></div>
</div>
<div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
</div>

<div class="container">

    <!-- ===== 시작 화면 ===== -->
    <div class="screen active" id="screen-start">
        <div class="start-card">
            <div class="start-emoji">🎯</div>
            <div class="start-title">나에게 딱 맞는<br>요기보를 찾아보세요!</div>
            <div class="start-desc">몇 가지 간단한 질문으로<br>최적의 요기보 제품을 추천해 드립니다.<br>참여 후 경품 응모 기회도 드려요! 🎁</div>
            <button class="btn-start" onclick="startQuiz()">테스트 시작하기 →</button>
        </div>
    </div>

    <!-- ===== 질문 화면 ===== -->
    <div class="screen" id="screen-quiz">
        <div class="q-card">
            <div class="q-step" id="q-step">Q1 / 5</div>
            <div class="q-title" id="q-title">질문</div>
            <div class="q-sub" id="q-sub"></div>
            <div class="choices" id="choices"></div>
        </div>
    </div>

    <!-- ===== 이동경로 확인 화면 ===== -->
    <div class="screen" id="screen-path">
        <div class="path-card">
            <div class="path-title">🗺️ 내가 선택한 경로</div>
            <div class="path-sub">지금까지의 답변을 확인해 보세요.</div>
            <div class="path-list" id="path-list"></div>
        </div>
        <button class="btn-see-result" onclick="showResult()">🎉 내 추천 결과 확인하기</button>
    </div>

    <!-- ===== 결과 화면 ===== -->
    <div class="screen" id="screen-result">
        <div class="result-card">
            <div class="result-badge">맞춤 추천 결과</div>
            <div class="result-emoji" id="result-emoji">🛋️</div>
            <div class="result-name" id="result-name"></div>
            <div class="result-desc" id="result-desc"></div>
        </div>
        <div class="apply-card" id="apply-section">
            <div class="apply-title">🎁 경품 이벤트 응모</div>
            <div class="apply-sub">정보를 입력하고 경품 추첨에 참여하세요!</div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="applicant-name" placeholder="홍길동">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="tel" id="applicant-phone" placeholder="010-0000-0000">
            </div>
            <button class="btn-apply" onclick="submitApply()">응모 완료 ✓</button>
        </div>
        <button class="btn-restart" onclick="restartQuiz()">↺ 다시 테스트하기</button>
    </div>

</div>

    // 액세서리
    RESULT_ACC_HOME:       { emoji: '🎒', name: '요기보 서포트', desc: '집에서 편안하게 기대기 좋은 요기보 서포트 시리즈! 빈백과 함께 사용하면 완벽한 자세를 만들어 줘요.' },
    RESULT_ACC_TRAVEL:     { emoji: '🎒', name: '요기보 숄더백 / 이동형 커버', desc: '야외 활동과 이동에 최적화된 요기보 액세서리! 가볍고 실용적으로 어디서나 요기보 라이프를 즐기세요.' },
    RESULT_ACC_LONG:       { emoji: '💼', name: '트레이닉스 / 요기보 트레이', desc: '장시간 앉아 있을 때 필수! 음료, 노트북, 책 등을 올려두기 편한 요기보 전용 트레이 시리즈를 추천해요.' },
    RESULT_ACC_FREQUENT:   { emoji: '🔧', name: '넬맥스 / 맥스 커버', desc: '매일 사용하는 분들을 위한 내구성 좋은 커버와 액세서리! 세탁이 간편하고 오래 써도 끄떡없어요.' },
    RESULT_ACC_KID:        { emoji: '👨‍👧', name: '요기보 키즈 액세서리 세트', desc: '아이와 함께 사용하기 좋은 안전하고 컬러풀한 요기보 케어 세트! 청소하기 쉬운 소재로 부모님도 편안해요.' },
    // 바디
    RESULT_BODY_SUPPORT:   { emoji: '🧘', name: '요기보 서포트 / 롤 맥스', desc: '조용한 휴식을 위한 최적의 바디 서포터! 독서, 업무, 명상 시 완벽한 자세를 유지해 드려요.' },
    RESULT_BODY_FLEX:      { emoji: '🤸', name: '요기보 플렉스 / 짐 시리즈', desc: '운동과 스트레칭에 특화된 요기보 액티브 라인! 유연한 소재로 다양한 자세를 지지해 줘요.' },
    // 빈백 - 1차 추천 (중간 단계)
    BEAN_1ST_NEXS:         { base: '요기보 넥스', emoji: '🛋️' },
    BEAN_1ST_MINI:         { base: '요기보 미니', emoji: '🪑' },
    BEAN_1ST_PYRAMID:      { base: '요기보 피라미드', emoji: '🔺' },
    BEAN_1ST_MINI_NEXS:    { base: '요기보 미니 + 넥스', emoji: '🛋️' },
    // 빈백 최종
    RESULT_BEAN_FINAL: null, // 동적으로 구성됨
};

// =============================================
// 퀴즈 상태
// =============================================
let sessionId = null;
let currentPath = [];
let currentQ = null;
let beanFirstProduct = null;
let beanCover = '기본 커버';
let beanExtra = '';
let beanAdjusted = false;
let totalSteps = 5;
let stepNum = 0;

// =============================================
// 진행 상태 업데이트
// =============================================
function updateProgress(step, total) {
    stepNum = step;
    totalSteps = total;
    const pct = total > 0 ? Math.round(step / total * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = step > 0 ? `${step} / ${total} 단계` : '';
}

// =============================================
// 퀴즈 시작
// =============================================
async function startQuiz() {
    currentPath = [];
    beanFirstProduct = null;
    beanCover = '기본 커버';
    beanExtra = '';
    beanAdjusted = false;
    stepNum = 0;

    // 세션 생성
    try {
        const visitorId = localStorage.getItem('_yg_vid') || 'guest_' + Date.now();
        localStorage.setItem('_yg_vid', visitorId);
        const r = await fetch(`${API}/api/event/session`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ visitorId, userAgent: navigator.userAgent }),
            keepalive: true
        });
        const j = await r.json();
        if (j.success) sessionId = j.sessionId;
    } catch(e) { sessionId = 'local_' + Date.now(); }

    showScreen('screen-quiz');
    renderQ('q1', 1, 5);
}

// =============================================
// 질문 렌더링
// =============================================
function renderQ(qKey, step, total) {
    currentQ = qKey;
    updateProgress(step, total);
    const q = QUIZ[qKey];
    if (!q) return;
    document.getElementById('q-step').textContent = `Q${step} / ${total}`;
    document.getElementById('q-title').textContent = q.title;
    document.getElementById('q-sub').textContent = q.sub || '';
    const choicesEl = document.getElementById('choices');
    choicesEl.className = 'choices' + (q.grid ? ' grid' : '');
    choicesEl.innerHTML = '';
    q.choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-emoji">${c.emoji}</span>${c.text}`;
        btn.onclick = () => handleChoice(q, c, step, total);
        choicesEl.appendChild(btn);
    });
}

// =============================================
// 선택 처리
// =============================================
async function handleChoice(q, choice, step, total) {
    // 경로 기록
    const pathEntry = { question: q.id, answer: choice.text };
    currentPath.push(pathEntry);
    recordStep(q.id, choice.text);

    // 빈백 특수 로직
    if (choice.next && choice.next.startsWith('BEAN_1ST_')) {
        beanFirstProduct = RESULTS[choice.next];
        if (choice.adjustToSupport) beanAdjusted = true;
        renderQ('q_bean_back', step + 1, 7);
        return;
    }
    if (choice.cover) beanCover = choice.cover;
    if (choice.extra) beanExtra = choice.extra;
    if (choice.adjustToSupport) beanAdjusted = true;

    // 빈백 경로 내 다음 질문
    if (choice.next === 'q_bean_outdoor') { renderQ('q_bean_outdoor', step + 1, 7); return; }
    if (choice.next === 'q_bean_time') { renderQ('q_bean_time', step + 1, 7); return; }
    if (choice.next === 'q_bean_carry') { renderQ('q_bean_carry', step + 1, 7); return; }

    // 다음 퀴즈 질문
    if (QUIZ[choice.next]) {
        let nextStep = step + 1;
        let nextTotal = total;
        if (choice.next === 'q_doll_2') { nextTotal = 3; }
        if (choice.next === 'q_bean_user') { nextTotal = 7; }
        if (choice.next === 'q_bean_sit') { nextStep = 2; nextTotal = 7; }
        if (choice.next === 'q_bean_back') { nextStep = 3; }
        renderQ(choice.next, nextStep, nextTotal);
        return;
    }

    // 결과
    if (choice.next && choice.next.startsWith('RESULT_')) {
        showPathScreen(choice.next);
    } else if (choice.next === 'RESULT_BEAN_FINAL') {
        showPathScreen('RESULT_BEAN_FINAL');
    }
}

// =============================================
// 경로 서버 전송
// =============================================
async function recordStep(question, answer) {
    if (!sessionId) return;
    try {
        fetch(`${API}/api/event/session/${sessionId}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, answer }), keepalive: true
        });
    } catch(e) {}
}

// =============================================
// 이동경로 화면
// =============================================
let pendingResultKey = null;
function showPathScreen(resultKey) {
    pendingResultKey = resultKey;
    const list = document.getElementById('path-list');
    list.innerHTML = currentPath.map((p, i) => `
        <div class="path-item">
            <div class="path-dot">${i + 1}</div>
            <div class="path-info">
                <div class="path-q">${p.question.replace('Q', '질문 ').replace('_', ' ▶ ')}</div>
                <div class="path-a">${p.answer}</div>
            </div>
        </div>
    `).join('');
    showScreen('screen-path');
    updateProgress(stepNum, totalSteps);
    document.getElementById('progress-bar').style.width = '90%';
}

// =============================================
// 결과 화면
// =============================================
function showResult() {
    let result;
    if (pendingResultKey === 'RESULT_BEAN_FINAL') {
        const base = beanFirstProduct ? beanFirstProduct.base : '요기보 넥스';
        const emoji = beanFirstProduct ? beanFirstProduct.emoji : '🛋️';
        const adjustNote = beanAdjusted ? ' (허리 지지 보강)' : '';
        const extraNote = beanExtra ? ` + ${beanExtra}` : '';
        const coverNote = ` + ${beanCover}`;
        result = {
            emoji, name: `${base}${adjustNote}`,
            desc: `회원님께 딱 맞는 구성은 **${base}${adjustNote}${extraNote}${coverNote}** 입니다!\n다양한 자세로 편안하게 즐길 수 있는 요기보의 베스트셀러 조합이에요. 🎉`
        };
    } else {
        result = RESULTS[pendingResultKey] || { emoji: '🛋️', name: '요기보 추천 제품', desc: '전문 상담사가 더 자세히 안내해 드릴게요!' };
    }

    document.getElementById('result-emoji').textContent = result.emoji;
    document.getElementById('result-name').textContent = result.name;
    document.getElementById('result-desc').textContent = result.desc.replace(/\*\*/g, '');

    showScreen('screen-result');
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('progress-text').textContent = '완료!';
}

// =============================================
// 응모 제출
// =============================================
async function submitApply() {
    const name = document.getElementById('applicant-name').value.trim();
    const phone = document.getElementById('applicant-phone').value.trim();
    if (!name || !phone) { alert('이름과 연락처를 모두 입력해 주세요.'); return; }

    const resultName = document.getElementById('result-name').textContent;
    try {
        await fetch(`${API}/api/event/session/${sessionId}/complete`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ finalResult: resultName, applicantName: name, applicantPhone: phone }),
            keepalive: true
        });
    } catch(e) {}

    document.getElementById('apply-section').innerHTML =
        `<div class="already-applied">🎉 응모가 완료되었습니다!<br><span style="font-size:13px;font-weight:400;color:#15803d">${name}님, 당첨을 기대해 주세요!</span></div>`;
}

// =============================================
// 화면 전환 유틸리티
// =============================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
    updateProgress(0, 0);
    document.getElementById('progress-text').textContent = '';
    showScreen('screen-start');
}
</script>
</body>
</html>
