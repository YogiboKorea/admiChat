<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나에게 꼭 맞는 요기보 찾기 TEST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --primary: #55B5C9;
            --primary-hover: #E9F6F8;
            --primary-dark: #469AA9;
            --bg: #f7f9fa;
            --text: #1a1a1a;
            --sub: #555;
            --border: #e0e6ed;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }
        @media (max-width: 500px) { body { padding: 0; } }

        .container {
            width: 100%; max-width: 480px;
            background: #fff;
            box-shadow: 0 15px 40px rgba(85,181,201,0.1);
            border-radius: 32px;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            min-height: 70vh;
        }
        @media (max-width: 500px) { .container { border-radius: 0; min-height: 100vh; } }

        .logo-wrap {
            position: absolute; top: 28px; left: 24px; z-index: 10;
        }
        .logo-wrap img { max-width: 100px; height: auto; display: block; }

        .wrap {
            padding: 30px 24px 40px;
            display: flex; flex-direction: column; flex-grow: 1; justify-content: center;
        }

        /* ===== 화면 전환 ===== */
        .step { display: none; }
        .step.active {
            display: flex; flex-direction: column; align-items: center;
            animation: fadeUp 0.35s ease;
            margin-top: 55px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== 메이트 캐릭터 ===== */
        .mate-wrap {
            margin-bottom: 20px; position: relative;
            display: flex; justify-content: center;
        }
        .mate-img {
            max-width: 110px; height: auto; display: block;
            animation: float 3s ease-in-out infinite;
        }
        .mate-shadow {
            position: absolute; bottom: -6px; left: 50%;
            transform: translateX(-50%);
            width: 55px; height: 10px;
            background: rgba(0,0,0,0.06); border-radius: 50%; filter: blur(2px);
            animation: shadowAnim 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        @keyframes shadowAnim {
            0%,100% { transform: translateX(-50%) scale(1); opacity: 1; }
            50%      { transform: translateX(-50%) scale(0.8); opacity: 0.5; }
        }

        /* ===== 말풍선 질문 박스 ===== */
        .q-box {
            background: #fff; padding: 20px 24px;
            border-radius: 20px; border: 1px solid var(--border);
            position: relative; margin-bottom: 24px; width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .q-box::before {
            content: ''; position: absolute; top: -11px; left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent; border-bottom-color: var(--border);
        }
        .q-box::after {
            content: ''; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent; border-bottom-color: #fff;
        }
        .q-text {
            font-size: clamp(17px, 5vw, 21px);
            font-weight: 500; line-height: 1.5;
            letter-spacing: -0.03em; word-break: keep-all;
        }
        .q-sub { font-size: 13px; color: var(--sub); margin-top: 8px; font-weight: 400; }

        /* ===== 선택 버튼 ===== */
        .opt {
            width: 100%; margin-bottom: 12px;
            min-height: 58px; padding: 16px 20px;
            border: 1px solid var(--border); border-radius: 50px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; background: #fff; color: var(--text);
            word-break: keep-all; line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            font-family: 'Pretendard', sans-serif;
        }
        .opt:hover { background: var(--primary-hover); border-color: rgba(85,181,201,0.4); color: var(--primary); }
        .opt.selected {
            background: var(--primary); color: #fff;
            border-color: var(--primary); font-weight: 700;
            box-shadow: 0 5px 15px rgba(85,181,201,0.35);
            transform: translateY(-2px);
        }
        .opts-wrap { width: 100%; }

        /* ===== 시작 화면 START 버튼 ===== */
        .start-card {
            width: 100%; min-height: 280px;
            background: var(--primary);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer; overflow: hidden;
            transition: filter 0.2s;
        }
        .start-card:hover { filter: brightness(0.96); }
        .start-text { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 5px; z-index: 2; }
        .start-dino { position: absolute; bottom: 0; right: 0; width: 130px; pointer-events: none; z-index: 3; }
        .start-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-align: center; }
        .start-desc { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 20px; text-align: center; }

        /* ===== 하단 네비 ===== */
        .bottom-nav {
            margin-top: auto; padding-top: 28px;
            display: none; flex-direction: column; width: 100%;
        }
        .bottom-nav.active { display: flex; }
        .next-btn {
            background: none; border: none;
            color: #bbb; font-size: 15px; font-weight: 600;
            letter-spacing: -0.02em; text-align: right;
            padding: 8px 0; cursor: pointer; margin-right: 4px; margin-bottom: 12px;
            transition: all 0.2s; font-family: 'Pretendard', sans-serif;
        }
        .next-btn.ready { color: var(--primary); }
        .next-btn.ready:hover { transform: translateX(3px); }
        .prev-btn {
            background: none; border: none; color: #bbb;
            font-size: 15px; font-weight: 600; text-align: left;
            padding: 8px 0; cursor: pointer; transition: all 0.2s;
            font-family: 'Pretendard', sans-serif;
        }
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-bar {
            display: flex; gap: 6px; width: 100%;
        }
        .seg { height: 6px; flex: 1; background: #eee; border-radius: 10px; overflow: hidden; position: relative; }
        .seg-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            width: 0%; background: var(--primary); border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ===== 경로 확인 화면 ===== */
        .path-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; text-align: center; }
        .path-sub { font-size: 13px; color: var(--sub); margin-bottom: 24px; text-align: center; }
        .path-item {
            display: flex; gap: 14px; align-items: flex-start; margin-bottom: 18px; width: 100%;
        }
        .path-num {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--primary); color: #fff;
            font-size: 12px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .path-qlbl { font-size: 11px; color: #bbb; font-weight: 700; margin-bottom: 3px; }
        .path-atxt { font-size: 15px; font-weight: 700; }
        .btn-confirm {
            width: 100%; margin-top: 8px;
            padding: 18px; border: none; border-radius: 50px;
            background: var(--primary); color: #fff;
            font-size: 17px; font-weight: 700; cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 5px 15px rgba(85,181,201,0.35);
            transition: all 0.2s;
        }
        .btn-confirm:hover { background: var(--primary-dark); }

        /* ===== 결과 화면 ===== */
        .result-step { margin-top: 55px; }
        .result-greeting {
            font-size: clamp(16px,5vw,19px); font-weight: 700;
            text-align: center; line-height: 1.6; margin-bottom: 20px;
            color: var(--text);
        }
        .result-product-area {
            width: 100%; background: var(--bg);
            border-radius: 20px; padding: 22px;
            margin-bottom: 20px;
        }
        .result-tag { font-size: 11px; color: var(--sub); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
        .result-name { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 16px; letter-spacing: -0.5px; }
        .result-features { display: flex; flex-direction: column; gap: 10px; }
        .result-feature { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: #333; line-height: 1.5; }
        .feat-check {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--primary); color: #fff;
            font-size: 11px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
        }
        .color-area { width: 100%; margin-bottom: 20px; }
        .color-label { font-size: 12px; font-weight: 700; color: #aaa; margin-bottom: 10px; }
        .color-row { display: flex; align-items: center; gap: 8px; }
        .color-circle { width: 26px; height: 26px; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        .color-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .color-desc { font-size: 12px; color: var(--sub); margin-top: 4px; }
        .btn-store {
            width: 100%; padding: 18px;
            border: none; border-radius: 50px;
            font-size: 17px; font-weight: 700;
            background: var(--text); color: #fff;
            cursor: pointer; margin-bottom: 12px;
            font-family: 'Pretendard', sans-serif;
        }
        .btn-retry {
            width: 100%; padding: 16px;
            border: 1px solid var(--border); border-radius: 50px;
            font-size: 15px; font-weight: 600; color: var(--sub);
            background: #fff; cursor: pointer;
            font-family: 'Pretendard', sans-serif;
        }
        .btn-retry:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="logo-wrap">
        <img src="/web/img/icon/logo3_on.png" alt="Yogibo">
    </div>
    <div class="wrap">

        <!-- 시작 화면 -->
        <div class="step active" id="step-start" style="margin-top:55px">
            <div class="start-title">나에게 꼭 맞는 요기보 찾기 TEST</div>
            <div class="start-desc">테스트 문항을 순서대로 눌러보세요.<br>고객님께 가장 잘 맞는 요기보를 추천해드릴게요!</div>
            <div class="start-card" onclick="startQuiz()">
                <div class="start-text">START</div>
                <img class="start-dino" src="/web/img/marketing/mate_icon_01.png" alt="">
            </div>
        </div>

        <!-- 퀴즈 화면 -->
        <div class="step" id="step-quiz">
            <div class="mate-wrap">
                <img class="mate-img" id="quiz-mate" src="/web/img/marketing/mate_icon_02.png" alt="">
                <div class="mate-shadow"></div>
            </div>
            <div class="q-box">
                <p class="q-text" id="q-text"></p>
                <span class="q-sub" id="q-sub"></span>
            </div>
            <div class="opts-wrap" id="opts-wrap"></div>
        </div>

        <!-- 경로 확인 화면 -->
        <div class="step" id="step-path" style="width:100%">
            <div class="mate-wrap">
                <img class="mate-img" src="/web/img/marketing/mate_icon_05.png" alt="">
                <div class="mate-shadow"></div>
            </div>
            <div class="q-box">
                <p class="q-text" style="font-weight:400">지금까지 선택한<br>경로를 확인해 보세요!</p>
            </div>
            <div class="opts-wrap" id="path-list"></div>
            <button class="btn-confirm" onclick="showResult()">결과 확인하기 →</button>
        </div>

        <!-- 결과 화면 -->
        <div class="step result-step" id="step-result" style="width:100%">
            <div class="result-greeting">고객님의 라이프스타일과<br>가장 잘 어울리는 요기보를 알려드려요!</div>
            <div class="result-product-area">
                <div class="result-tag" id="r-tag">추천 제품</div>
                <div class="result-name" id="r-name">요기보 넥스</div>
                <div class="result-features" id="r-features"></div>
            </div>
            <div class="color-area" id="color-area" style="display:none">
                <div class="color-label">추천 컬러 &amp; 소재</div>
                <div class="color-row" id="color-chips"></div>
                <div class="color-desc" id="color-desc"></div>
            </div>
            <button class="btn-store">매장에서 직접 체험해보세요 🛋️</button>
            <button class="btn-retry" onclick="restartQuiz()">테스트 다시 하기</button>
        </div>

        <!-- 하단 네비 -->
        <div class="bottom-nav" id="bottom-nav">
            <div class="nav-row">
                <button class="prev-btn" id="prev-btn" onclick="goPrev()">＜ 이전</button>
                <button class="next-btn" id="next-btn" onclick="goNext()">다음 ＞</button>
            </div>
            <div class="progress-bar" id="progress-bar"></div>
        </div>

    </div>
</div>

<script>
const API = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app';

    RESULT_ACC_TRAVEL: {

        colorName: '무채색 계열', colorHex: ['#555','#aaa'],
        colorDesc: '어디서든 잘 어울리는 뉴트럴 컬러 추천!'
    },
    RESULT_ACC_LONG: {

        features: ['장시간 앉아 있을 때 필수 아이템!','노트북, 책, 음료를 올려두기 편한 트레이.','다양한 용도로 활용 가능해요.'],
        colorName: '우드 계열', colorHex: ['#a07850','#c8a882'],
        colorDesc: '인테리어에 잘 녹아드는 우드 톤 추천!'
    },
    RESULT_ACC_FREQ: {
        tag: '액세서리 추천 결과', name: '요기보 맥스 커버',
        features: ['매일 사용해도 끄떡없는 내구성!','세탁이 간편해 항상 청결하게 유지.','풍부한 컬러 라인업으로 취향 저격.'],
        colorName: '줄라 (Zoola)', colorHex: ['#55b5c9','#3e8fa0'],
        colorDesc: '세탁 후에도 색이 선명하게 유지돼요!'

    RESULT_ACC_KID: {
        tag: '액세서리 추천 결과', name: '요기보 키즈 액세서리 세트',
        features: ['아이와 함께 사용하기 좋은 안전한 소재.','컬러풀한 디자인으로 아이들이 좋아해요.','청소하기 쉬운 소재라 부모님도 편안해요.'],
        colorName: '선셋 핑크', colorHex: ['#f0a0b0','#d45070'],
        colorDesc: '밝고 발랄한 핑크 계열 추천!'
    },
    RESULT_BODY_SUPPORT: {
        tag: '바디 서포터 추천 결과', name: '요기보 서포트 / 롤 맥스',
        features: ['조용한 휴식을 위한 최적의 바디 서포터.','독서, 업무, 명상 시 완벽한 자세 유지.','척추 건강을 위한 인체공학 설계.'],
        colorName: '줄라 (Zoola)', colorHex: ['#55b5c9','#3e8fa0'],
        colorDesc: '마음이 편안해지는 블루 계열 추천!'
    },
    RESULT_BODY_FLEX: {
        tag: '바디 서포터 추천 결과', name: '요기보 플렉스',
        features: ['운동과 스트레칭에 특화된 액티브 라인.','유연한 소재로 다양한 자세를 지지.','역동적인 라이프스타일에 최적화됐어요.'],
        colorName: '라임 그린', colorHex: ['#90be6d','#52b788'],
        colorDesc: '활동적인 느낌의 그린 계열 추천!'
    },
    RESULT_BEAN: null, // 동적 생성
};

// =============================================
// 상태
// =============================================
let sessionId = null;
let history = []; // { qKey, answer, optData }
let beanFirst = null, beanAdjust = false, beanCover = '기본 커버', beanExtra = '';
let totalSteps = 0;

// =============================================
// 시작
// =============================================
async function startQuiz() {
    history = []; beanFirst = null; beanAdjust = false; beanCover = '기본 커버'; beanExtra = '';
    try {
        const vid = localStorage.getItem('_yg_vid') || ('g_' + Date.now());
        localStorage.setItem('_yg_vid', vid);
        const r = await fetch(`${API}/api/event/session`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ visitorId: vid, userAgent: navigator.userAgent }), keepalive: true
        });
        const j = await r.json();
        sessionId = j.success ? j.sessionId : ('l_' + Date.now());
    } catch(e) { sessionId = 'l_' + Date.now(); }
    renderQ('q1');
}

// =============================================
// 질문 렌더링
// =============================================
function renderQ(qKey) {
    const q = Q[qKey];
    if (!q) return;

    // 현재 qKey를 history의 마지막에 표시
    const currentHistoryEntry = history[history.length - 1];
    if (currentHistoryEntry) currentHistoryEntry._nextQKey = qKey;

    // 메이트 이미지 교체
    document.getElementById('quiz-mate').src = nextMate();

    // 질문/서브텍스트
    document.getElementById('q-text').innerHTML = q.text.replace(/\n/g, '<br>');
    document.getElementById('q-sub').textContent = q.sub || '';

    // 선택지
    const wrap = document.getElementById('opts-wrap');
    wrap.innerHTML = '';
    q.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = opt.text;
        btn.onclick = () => selectOpt(btn, q, qKey, opt, wrap);
        wrap.appendChild(btn);
    });

    // 진행바 계산
    calcTotalSteps(qKey);
    const stepNum = history.length + 1;
    updateProgress(stepNum);

    showScreen('step-quiz');
    document.getElementById('next-btn').classList.remove('ready');
    document.getElementById('next-btn').textContent = '다음 >';
    document.getElementById('prev-btn').disabled = history.length === 0;
    document.getElementById('bottom-nav').classList.add('active');

    // qKey 임시 저장
    document.getElementById('step-quiz').dataset.currentQ = qKey;
}

function calcTotalSteps(qKey) {
    // 최소 단계 계산: 질문별 깊이 근사치
    const depths = {
        q1: 1, q_doll_1: 2, q_doll_2: 3,
        q_acc: 2, q_body: 2,
        q_bean_user: 2, q_bean_usage: 3, q_bean_back: 4, q_bean_outdoor: 5, q_bean_time: 6, q_bean_carry: 7
    };
    const maxDepth = Math.max(...Object.values(depths));
    totalSteps = maxDepth;
}

function updateProgress(step) {
    const bar = document.getElementById('progress-bar');
    bar.innerHTML = '';
    const total = Math.max(totalSteps, step + 1);
    for (let i = 1; i <= total; i++) {
        const seg = document.createElement('div');
        seg.className = 'seg';
        const fill = document.createElement('div');
        fill.className = 'seg-fill';
        fill.style.width = i <= step ? '100%' : '0%';
        seg.appendChild(fill);
        bar.appendChild(seg);
    }
}

// =============================================
// 선택 처리
// =============================================
let currentOpt = null;
let currentQ = null;

function selectOpt(btn, q, qKey, opt, wrap) {
    wrap.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentOpt = { q, qKey, opt };
    currentQ = qKey;
    document.getElementById('next-btn').classList.add('ready');
}

function goNext() {
    if (!currentOpt) return;
    const { q, qKey, opt } = currentOpt;
    applyOpt(qKey, opt.text, opt);
}

function applyOpt(qKey, answer, opt) {
    // 빈백 특수 상태 저장
    if (opt.beanFirst) beanFirst = opt.beanFirst;
    if (opt.beanAdjust) beanAdjust = true;
    if (opt.beanCover) beanCover = opt.beanCover;
    if (opt.beanExtra) beanExtra = opt.beanExtra;

    history.push({ qKey, answer });
    recordStep(Q[qKey].id, answer);
    currentOpt = null;

    if (opt.next && opt.next.startsWith('RESULT_')) {
        showPathScreen(opt.next);
    } else if (opt.next) {
        renderQ(opt.next);
    }
}

function goPrev() {
    if (history.length === 0) return;
    const last = history.pop();
    currentOpt = null;
    if (last.qKey) renderQ(last.qKey);
    else showScreen('step-start');
}

// =============================================
// 경로 확인 화면
// =============================================
let pendingResult = null;
function showPathScreen(resultKey) {
    pendingResult = resultKey;
    const list = document.getElementById('path-list');
    list.innerHTML = history.map((h, i) => {
        const qLabel = Q[h.qKey] ? Q[h.qKey].id : '';
        return `<div class="path-item">
            <div class="path-num">${i + 1}</div>
            <div>
                <div class="path-qlbl">${qLabel.replace('Q', '질문 ').replace(/_/g, ' ')}</div>
                <div class="path-atxt">${h.answer}</div>
            </div>
        </div>`;
    }).join('');
    showScreen('step-path');
    document.getElementById('bottom-nav').classList.remove('active');
}

// =============================================
// 결과 화면
// =============================================
function showResult() {
    let r;
    if (pendingResult === 'RESULT_BEAN') {
        const baseMap = {
            NEXS: { name: '요기보 넥스', features: ['요기보 라인업 중 가장 편안하고 인기 있는 빈백이에요.', '독서·영상·업무 어디에도 어울리는 올라운더예요.', '가장 높은 누적 판매량의 시그니처 제품이에요.'] },
            MINI: { name: '요기보 미니', features: ['아담한 사이즈로 어디서나 활용도 만점!', '밝고 다양한 컬러로 방 꾸미기에도 완벽해요.', '가볍고 이동하기 편해 어디서든 사용 가능해요.'] },
            PYRAMID: { name: '요기보 피라미드', features: ['집중력을 높이는 안정적인 착석감이에요.', '독서·공부에 최적화된 자세 지지력을 제공해요.', '콤팩트한 디자인으로 공간을 넓게 활용해요.'] },
            MINI_NEXS: { name: '요기보 미니 + 넥스', features: ['아이와 함께 사용하기 딱 좋은 조합이에요.', '미니는 아이용, 넥스는 어른용으로 활용하세요.', '두 가지 크기로 온 가족이 즐길 수 있어요.'] },
        };
        const base = baseMap[beanFirst] || baseMap.NEXS;
        const adjustNote = beanAdjust ? ' (허리 지지 강화형)' : '';
        const extraNote = beanExtra ? ` + ${beanExtra}` : '';
        r = {
            tag: '빈백 추천 결과',
            name: base.name + adjustNote,
            features: [...base.features, `커버: ${beanCover}${extraNote ? ' / 부속품: ' + extraNote : ''}`],
            colorName: '줄라 (Zoola)',
            colorHex: ['#55b5c9','#3e8fa0'],
            colorDesc: '아이도 어른도 함께 사용하기 좋아요!'
        };
    } else {
        r = RESULTS[pendingResult] || RESULTS.RESULT_BODY_SUPPORT;
    }

    document.getElementById('r-tag').textContent = r.tag;
    document.getElementById('r-name').textContent = r.name;
    document.getElementById('r-features').innerHTML = r.features.map(f =>
        `<div class="result-feature"><div class="feat-check">✓</div><span>${f}</span></div>`
    ).join('');

    if (r.colorName) {
        document.getElementById('color-area').style.display = 'block';
        document.getElementById('color-chips').innerHTML =
            r.colorHex.map(h => `<div class="color-circle" style="background:${h}"></div>`).join('') +
            `<span class="color-name">&nbsp;${r.colorName}</span>`;
        document.getElementById('color-desc').textContent = r.colorDesc || '';
    }

    showScreen('step-result');
    document.getElementById('bottom-nav').classList.remove('active');
}

function showScreen(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
    history = []; beanFirst = null; beanAdjust = false; beanCover = '기본 커버'; beanExtra = '';
    document.getElementById('bottom-nav').classList.remove('active');
    showScreen('step-start');
}

function recordStep(question, answer) {
    if (!sessionId) return;
    fetch(`${API}/api/event/session/${sessionId}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, answer }), keepalive: true
    }).catch(() => {});
}
</script>
