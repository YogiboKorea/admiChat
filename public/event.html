<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나에게 꼭 맞는 요기보 찾기 TEST</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --primary-color: #55B5C9;
            /* Yogibo Blue */
            --bg-color: #f7f9fa;
            --text-color: #1a1a1a;
            --sub-text-color: #555;
            --border-color: #e0e6ed;
            --container-shadow: 0 15px 40px rgba(85, 181, 201, 0.1);
            --card-bg: #EAEAEA;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .survey-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            box-shadow: var(--container-shadow);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 70vh;
        }

        @media (max-width: 500px) {
            body {
                padding: 0;
            }

            .survey-container {
                border-radius: 0;
                min-height: 100vh;
            }
        }

        .content-wrap {
            padding: 30px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: flex-start;
        }

        /* 로고 중앙 정렬 */
        .logo {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .logo img {
            max-width: 110px;
            height: auto;
            display: block;
        }

        /* 화면 전환 */
        .step {
            display: none;
        }

        .step.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease;
            margin-top: 100px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 시작 화면 디자인 */
        .start-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 16px;
            text-align: center;
        }

        .start-desc {
            font-size: 15px;
            color: var(--text-color);
            line-height: 1.5;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }

        .start-card {
            width: 85%;
            height: 320px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .start-card:hover {
            filter: brightness(0.96);
        }

        .start-text {
            font-size: 32px;
            font-weight: 500;
            color: #1a1a1a;
            z-index: 2;
            letter-spacing: 1px;
        }

        .start-dino {
            position: absolute;
            bottom: -40px;
            right: -60px;
            width: 140px;
            pointer-events: none;
            z-index: 3;
        }

        /* 메이트 캐릭터 (말풍선 위) */
        .mate-narrator {
            margin-bottom: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .mate-img {
            max-width: 100px;
            height: auto;
            display: block;
            animation: float 3s ease-in-out infinite;
            will-change: transform;
        }

        .mate-shadow {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            filter: blur(2px);
            animation: shadowSize 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes shadowSize {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translateX(-50%) scale(0.8);
                opacity: 0.5;
            }
        }

        /* 질문 말풍선 박스 */
        .question-box {
            background-color: #fff;
            padding: 25px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            margin-bottom: 30px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .question-box::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid #fff;
        }

        .question-box::before {
            content: '';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid var(--border-color);
        }

        .question-text {
            font-size: clamp(19px, 5vw, 22px);
            font-weight: 700;
            word-break: keep-all;
            line-height: 1.4;
            margin: 0;
        }

        /* 선택 버튼 */
        .opts-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-btn {
            width: 100%;
            min-height: 60px;
            padding: 18px 20px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fff;
            color: var(--text-color);
            word-break: keep-all;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .opt-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }

        .opt-btn.selected {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(85, 181, 201, 0.3);
            transform: translateY(-2px);
        }

        /* Q6 컬러 선택 전용 버튼 스타일 (피그마 디자인 반영 - radius 20px) */
        .opt-btn.color-opt {
            position: relative;
            padding: 18px 20px;
            justify-content: center;
        }

        .color-box {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 76px;
            height: 36px;
            border-radius: 20px;
            /* 컬러 박스도 둥글게 */
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .color-text {
            text-align: center;
            color: inherit;
            width: 100%;
        }

        /* 하단 네비 및 프로그레스 바 */
        .bottom-nav {
            margin-top: auto;
            padding-top: 30px;
            display: none;
            flex-direction: column;
            width: 100%;
        }

        .bottom-nav.active {
            display: flex;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .prev-btn,
        .next-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            color: #aaa;
            padding: 10px 5px;
            transition: all 0.2s;
        }

        .prev-btn:hover {
            color: var(--text-color);
        }

        .next-btn.ready {
            color: var(--primary-color);
        }

        .next-btn.ready:hover {
            transform: translateX(3px);
        }

        .progress-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .progress-segment {
            height: 6px;
            flex: 1;
            background-color: #eee;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.4s ease-in-out;
            border-radius: 10px;
        }

        /* 결과보기 버튼 */
        .btn-see-result {
            width: 100%;
            margin-top: 10px;
            padding: 20px;
            border: none;
            border-radius: 50px;
            background: var(--primary-color);
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 5px 15px rgba(85, 181, 201, 0.3);
            transition: all 0.2s;
        }

        /* =========================================================
           결과 화면 공간 확장 & 모서리 20px 적용
           ========================================================= */
        .result-title-top {
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
            margin-top: -10px;
        }

        .result-content {
            display: none;
            width: 100%;
        }

        .result-content.active {
            display: block;
            width: 100%;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 24px;
        }

        .result-header {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            align-items: stretch;
        }

        .result-img {
            width: 130px;
            height: 130px;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .result-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-tag {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-name {
            font-size: 24px;
            font-weight: 900;
            color: #111;
            line-height: 1.35;
            word-break: keep-all;
            letter-spacing: -0.5px;
        }

        .result-features {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-top: 24px;
        }

        .result-features li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 15px;
            color: #111;
            font-weight: 600;
            line-height: 1.45;
            word-break: keep-all;
        }

        .result-features li::before {
            content: '✔';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #111;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* 하단: 컬러칩 / 캐릭터칩 영역 */
        .result-colors {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .result-colors-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 14px;
        }

        .result-colors-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .color-chip {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: inline-block;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .color-chip.striped {
            background: repeating-linear-gradient(90deg, #016DB5, #016DB5 4px, #fff 4px, #fff 8px);
        }

        .character-chip {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid #eee;
        }

        .character-chip img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .result-footer {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .result-store-text {
            font-size: 22px;
            font-weight: 800;
            color: #000;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .btn-retry {
            display: inline-block;
            padding: 16px 40px;
            border: 1px solid #8D8B8B;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            color: #8D8B8B;
            background: #fff;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            transition: all 0.2s;
        }

        .btn-retry:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <div class="survey-container">
        <div class="content-wrap">
            <div class="logo"><img src="/web/img/icon/logo3_on.png" alt="Yogibo"></div>

            <div class="step active" id="step-start">
                <div class="start-title">나에게 꼭 맞는 요기보 찾기 TEST</div>
                <div class="start-desc">테스트 문항을 순서대로 눌러보세요.<br>고객님께 가장 잘 맞는 요기보를 추천해드릴게요!</div>
                <div class="start-card" onclick="startQuiz()">
                    <div class="start-text">START</div>
                    <img class="start-dino" src="/web/img/marketing/mate_icon_001.png" alt="">
                </div>
            </div>

            <div class="step" id="step-quiz">
                <div class="mate-narrator"><img class="mate-img" id="quiz-mate"
                        src="/web/img/marketing/mate_icon_02.png" alt="">
                    <div class="mate-shadow"></div>
                </div>
                <div class="question-box">
                    <p class="question-text" id="q-text"></p>
                </div>
                <div class="opts-wrap" id="opts-wrap"></div>
            </div>

            <div class="step" id="step-ready">
                <div class="mate-narrator"><img class="mate-img" src="/web/img/marketing/mate_icon_01.png" alt=""
                        style="max-width:110px">
                    <div class="mate-shadow"></div>
                </div>
                <div class="question-box">
                    <p class="question-text" style="font-weight:600;">아래의 버튼을 눌러<br>결과를 확인해주세요!</p>
                </div>
                <button class="btn-see-result" onclick="showResult()">결과보기</button>
            </div>

            <div class="step" id="step-result">
                <div class="result-title-top">고객님의 라이프스타일과<br>가장 잘 어울리는 요기보를 알려드려요!</div>

                <div id="dynamic-result-container"></div>

                <div class="result-footer">
                    <div class="result-store-text">매장에서 직접 체험해보세요 🥰</div>
                    <button class="btn-retry" onclick="restartQuiz()">테스트 다시 하기</button>
                </div>
            </div>

            <div class="bottom-nav" id="bottom-nav">
                <div class="nav-buttons">
                    <button class="prev-btn" id="prev-btn" onclick="goPrev()">＜ 이전</button>
                    <button class="next-btn" id="next-btn" onclick="goNext()">다음 ＞</button>
                </div>
                <div class="progress-container">
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-1"></div>
                    </div>
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-2"></div>
                    </div>
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-3"></div>
                    </div>
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-4"></div>
                    </div>
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-5"></div>
                    </div>
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app';
        const MATE_POOL = ['02', '03', '04', '06', '07', '08', '09', '10', '11', '13'];
        let mateIdx = 0;
        function nextMate() { return `/web/img/marketing/mate_icon_${MATE_POOL[mateIdx++ % MATE_POOL.length]}.png`; }

        // 설문조사 데이터 배열
        const QUESTIONS = [
            { key: 'Q1', text: '반갑습니다 고객님!\n요기보의 어떤 제품에 관심이 있으신가요?', opts: ['빈백소파', '바디필로우', '리빙 액세서리', '인형', '골고루 관심있음'] },
            { key: 'Q2', text: '주로 사용할 분은 누구인가요?', opts: ['성인', '미취학 ~ 초등학생', '청소년', '성인 + 아이 함께'] },
            { key: 'Q3', text: '주로 어떤 공간에서 사용하실 건가요?', opts: ['거실 / 침실 (실내)', '원룸 / 작은 공간', '넓은 거실 / 패밀리룸', '이동하며 여러 공간에서', '야외 (베란다, 캠핑, 테라스)'] },
            { key: 'Q4', text: '제품 선택에서 가장 중요한 가치는\n무엇인가요?', opts: ['편안함 / 릴랙스', '튼튼함 / 내구성', '예쁜 디자인', '가성비', '공간 효율 / 미니멀'] },
            { key: 'Q5', text: '주로 어떤 상황에서 사용하실 건가요?', opts: ['잠깐 앉거나 기대서 쉬는 용도', 'TV · 독서 등 30분 이상 사용', '누워서 휴식 또는 잠들기 전', '아이가 앉거나 기대는 용도', '아직 잘 모르겠어요'] },
            {
                key: 'Q6', text: '선호하시는 컬러 계열은 무엇인가요?',
                opts: [
                    { label: '레드 계열', color: '#FC2B01' },
                    { label: '그린 계열', color: '#749804' },
                    { label: '블루 계열', color: '#016DB5' },
                    { label: '그레이 계열', color: '#C3B2AA' }
                ]
            }
        ];

        let sessionId = null;
        let step = 0;
        let answers = {};
        let currentSel = null;

        async function startQuiz() {
            step = 0; answers = {}; currentSel = null;
            try {
                const vid = localStorage.getItem('_yg_vid') || ('g_' + Date.now());
                localStorage.setItem('_yg_vid', vid);
                const r = await fetch(`${API}/api/event/session`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ visitorId: vid, userAgent: navigator.userAgent }), keepalive: true
                });
                const j = await r.json();
                sessionId = j.success ? j.sessionId : ('l_' + Date.now());
            } catch (e) { sessionId = 'l_' + Date.now(); }
            renderQ();
        }

        function renderQ() {
            const q = QUESTIONS[step];
            currentSel = null;
            document.getElementById('quiz-mate').src = nextMate();
            document.getElementById('q-text').innerHTML = q.text.replace(/\n/g, '<br>');

            const wrap = document.getElementById('opts-wrap');
            wrap.innerHTML = '';

            q.opts.forEach(opt => {
                const btn = document.createElement('button');
                if (typeof opt === 'object' && opt.color) {
                    btn.className = 'opt-btn color-opt';
                    btn.innerHTML = `<div class="color-box" style="background-color: ${opt.color};"></div><div class="color-text">${opt.label}</div>`;
                    btn.onclick = () => selectOption(btn, opt.label);
                } else {
                    btn.className = 'opt-btn';
                    btn.textContent = opt;
                    btn.onclick = () => selectOption(btn, opt);
                }
                wrap.appendChild(btn);
            });

            updateProgressBar();
            document.getElementById('prev-btn').style.visibility = step === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').classList.remove('ready');
            document.getElementById('bottom-nav').classList.add('active');
            showScreen('step-quiz');
        }

        function selectOption(btn, value) {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentSel = value;
            document.getElementById('next-btn').classList.add('ready');
        }

        function goNext() {
            if (!currentSel) return;
            const q = QUESTIONS[step];
            answers[q.key] = currentSel;
            recordStep(q.key, currentSel);

            if (step < QUESTIONS.length - 1) {
                step++;
                renderQ();
            } else {
                document.getElementById('bottom-nav').classList.remove('active');
                showScreen('step-ready');
            }
        }

        function goPrev() {
            if (step === 0) return;
            step--;
            renderQ();
        }

        function updateProgressBar() {
            for (let i = 1; i <= 6; i++) {
                const fill = document.getElementById(`fill-${i}`);
                if (!fill) continue;
                if (i <= step) {
                    fill.style.width = "100%";
                    fill.style.backgroundColor = "var(--primary-color)";
                } else if (i === step + 1) {
                    fill.style.width = "100%";
                    fill.style.backgroundColor = "var(--primary-color)";
                } else {
                    fill.style.width = "0%";
                    fill.style.backgroundColor = "#eee";
                }
            }
        }

        /* 🔥 기획안 로직 기반 제품 도출 엔진 🔥 */
        function computeResult() {
            const q1 = answers.Q1 || '';
            const q2 = answers.Q2 || '';
            const q3 = answers.Q3 || '';
            const q4 = answers.Q4 || '';
            const q5 = answers.Q5 || '';
            const q6 = answers.Q6 || '';

            let result = {
                category: '',
                productName: '',
                imgUrl: '',
                features: [],
                bead: '', // 프리미엄 플러스, 프리미엄, 스탠다드
                coverType: 'Cotton', // Cotton or Zoola
                colors: [] // 추천 컬러 배열
            };

            // 1. 카테고리 분기 및 기본 매핑
            if (q1 === '인형') {
                result.category = 'DOLL';
                if (q2.includes('미취학') || q2.includes('함께')) {
                    result.productName = '요기보 메이트';
                    result.imgUrl = '/web/img/product/mate.jpg';
                    result.features = ['아이 정서 안정과 감각 발달에 좋은 애착인형', '요기보 패브릭 사용으로 아이 사용 시에도 안심할 수 있어요', '가볍고 부드러운 사용감의 비즈가 들어있어요'];
                } else {
                    result.productName = '요기보 스퀴지보';
                    result.imgUrl = '/web/img/product/squeezibo.jpg';
                    result.features = ['주무르면 기분 좋아지는 스트레스 해소 볼이에요', '사무실이나 집에서 집중력 향상에도 도움을 줘요', '소근육 운동 및 스트레스 해소에 최적화됐어요'];
                }
            } else if (q1 === '리빙 액세서리') {
                result.category = 'ACC';
                if (q5.includes('30분') || q5.includes('아이')) {
                    result.productName = '요기보 트레이보 엑스';
                    result.imgUrl = '/web/img/product/traybox.jpg';
                    result.features = ['태블릿, 책, 무릎 위 테이블로 완벽한 거치대예요', '30분 이상 독서나 학습 시 자세를 편안하게 유지해줘요', '아이들 독서 및 영상 시청 테이블로도 최고예요'];
                } else if (q5.includes('누워')) {
                    result.productName = '요기보 냅 엑스';
                    result.imgUrl = '/web/img/product/napx.jpg';
                    result.features = ['수면 안대가 내장된 프리미엄 목베개예요', '눕거나 잠들기 전 편안한 휴식에 최적화됐어요', '차, 비행기, 사무실 등 어디서든 빠른 회복을 도와요'];
                } else {
                    result.productName = '요기보 지퍼롤';
                    result.imgUrl = '/web/img/product/zipparoll.jpg';
                    result.features = ['지퍼로 변형되는 베개/방석/쿠션 다용도 액세서리예요', '상황에 따라 다양하게 활용할 수 있어요', '집, 사무실, 여행 어디서나 활용도 만점이에요'];
                }
            } else if (q1 === '바디필로우') {
                result.category = 'BODY';
                if (q5.includes('누워')) {
                    result.productName = '요기보 롤 맥스';
                    result.imgUrl = '/web/img/product/rollmax.jpg';
                    result.features = ['전신을 감싸는 긴 바디필로우로 침대 대용으로도 완벽해요', '잠들기 전 온몸의 긴장을 풀어주는 포근한 쿠션이에요', '세탁 가능한 커버라 항상 청결하게 사용할 수 있어요'];
                } else {
                    result.productName = '요기보 서포트';
                    result.imgUrl = '/web/img/product/support.jpg';
                    result.features = ['등과 허리를 완벽하게 받쳐주는 U자형 디자인이에요', '독서, TV 시청 시 상체를 최적으로 지지해요', '임산부 수유 쿠션 및 아이 가드로도 활용 가능해요'];
                }
            } else {
                // 빈백소파 & 골고루 관심있음 로직
                result.category = 'BEANBAG';
                if (q5.includes('아이')) {
                    if (q2.includes('미취학')) result.productName = '요기보 피라미드';
                    else if (q2.includes('청소년')) result.productName = '요기보 미니';
                    else result.productName = '요기보 맥스';
                } else if (q5.includes('누워')) {
                    result.productName = '요기보 맥스';
                } else if (q5.includes('30분')) {
                    if (q2.includes('청소년')) result.productName = '요기보 미니';
                    else result.productName = '요기보 맥스';
                } else if (q5.includes('잠깐')) {
                    result.productName = '요기보 미니';
                } else {
                    if (q2.includes('성인')) result.productName = '요기보 맥스';
                    else result.productName = '요기보 미니';
                }

                // Override: 공간 효율 우선시
                if (result.productName === '요기보 맥스' && q4.includes('공간')) {
                    result.productName = '요기보 미니';
                }

                // 이미지 및 특징 매핑
                if (result.productName === '요기보 피라미드') {
                    result.imgUrl = '/web/img/product/pyramid.jpg';
                    result.features = ['요기보 빈백 BEST 입문템', '작은 공간에서도 안정적으로 앉을 수 있는 컴팩트한 형태예요', '가장 높은 복원력과 탄탄함으로 장시간 사용에 적합해요'];
                } else if (result.productName === '요기보 미니') {
                    result.imgUrl = '/web/img/product/mini.jpg';
                    result.features = ['아담한 사이즈로 공간을 효율적으로 활용해요', '어디서나 손쉽게 이동할 수 있는 가벼운 무게예요', '다양한 컬러로 나만의 인테리어를 완성해보세요'];
                } else if (result.productName === '요기보 맥스') {
                    result.imgUrl = '/web/img/product/max.jpg';
                    result.features = ['온몸을 감싸는 넉넉한 사이즈로 완벽한 릴랙스를 경험해요', '가장 높은 복원력으로 오랫동안 편안함을 유지해요', '가족 모두가 함께 사용하기에 완벽한 사이즈예요'];
                }

                // 2. 충전재 (Bead Logic)
                if (q5.includes('누워')) result.bead = '프리미엄 플러스';
                else if (q4.includes('튼튼') || q5.includes('30분')) result.bead = '프리미엄';
                else result.bead = '스탠다드';

                // 3. 커버 및 컬러 로직 (Cover & Color Logic)
                if (q3.includes('야외')) result.coverType = 'Zoola';

                if (result.coverType === 'Zoola') {
                    // 야외용 컬러 매핑
                    if (q6.includes('블루')) {
                        result.colors = [{ name: '마린', hex: '#1a6ea6' }, { name: '스카이', hex: '#5bb5d0' }];
                    } else {
                        result.colors = [{ name: '오닉스', hex: '#2c2c2c' }];
                    }
                } else {
                    // 실내용 컬러 매핑
                    if (q6.includes('레드')) {
                        result.colors = [{ name: '블라썸 핑크', hex: '#e8849a' }, { name: '스위트 오렌지', hex: '#e8844e' }];
                    } else if (q6.includes('그린')) {
                        result.colors = [{ name: '올리브 그린', hex: '#6b8a4e' }, { name: '아보카도 그린', hex: '#7da44e' }];
                    } else if (q6.includes('블루')) {
                        result.colors = [{ name: '파스텔 블루', hex: '#7ab3d1' }, { name: '네이비 블루', hex: '#2e4279' }];
                    } else {
                        result.colors = [{ name: '라이트 그레이', hex: '#c8c8c8' }, { name: '다크 그레이', hex: '#666' }];
                    }
                }
            }

            return result;
        }

        function showResult() {
            const resultData = computeResult();
            const container = document.getElementById('dynamic-result-container');

            // 스크린샷처럼 제품명 바로 아래에 충전재 이름 붙이기 (피라미드 프리미엄 플러스 등)
            let displayName = resultData.productName;
            if (resultData.category === 'BEANBAG' && resultData.bead) {
                displayName = `${resultData.productName.replace('요기보 ', '')}<br><span style="font-size: 20px;">${resultData.bead}</span>`;
            }

            // 기본 제품 카드 HTML 생성 (회색 박스 전체 감싸기)
            let html = `
        <div class="result-card">
            <div class="result-header">
                <div class="result-img"><img src="${resultData.imgUrl}" alt="${resultData.productName}"></div>
                <div class="result-info">
                    <div class="result-tag">추천 제품</div>
                    <div class="result-name">${displayName}</div>
                </div>
            </div>
            <ul class="result-features">
                ${resultData.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
    `;

            // 카테고리별 하단 컬러칩/캐릭터칩/설명 컴포넌트 추가
            if (resultData.category === 'BEANBAG') {
                if (resultData.coverType === 'Zoola') {
                    html += `
            <div class="result-colors">
                <div class="result-colors-label">추천 커버 & 컬러</div>
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <span style="font-size: 18px; font-weight: 800; color: #1a1a1a;">줄라 (Zoola)</span>
                    <span class="color-chip striped"></span>
                    <span class="color-chip" style="background:#00d0f0;"></span>
                </div>
                <div style="font-size: 13px; color: #333; line-height: 1.4; font-weight: 500;">아웃도어용 커버로 아이·반려동물과 함께 사용하기 좋아요</div>
            </div>
            `;
                } else {
                    const colorChips = resultData.colors.map(c => `<span class="color-chip" style="background:${c.hex};" title="${c.name}"></span>`).join('');
                    html += `
            <div class="result-colors">
                <div class="result-colors-label">추천 커버 & 컬러</div>
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <span style="font-size: 18px; font-weight: 800; color: #1a1a1a;">줄라 (Zoola)</span>
                    ${colorChips}
                </div>
                <div style="font-size: 13px; color: #333; line-height: 1.4; font-weight: 500;">부드럽고 편안한 실내용 베이직 코튼 커버입니다</div>
            </div>
            `;
                }
            } else if (resultData.category === 'DOLL') {
                // 인형 캐릭터 가등록 칩
                html += `
        <div class="result-colors">
            <div class="result-colors-label">추천 캐릭터</div>
            <div class="result-colors-row">
                <div class="character-chip" title="돌고래"><img src="/web/img/product/char_dolphin.png" alt="돌고래"></div>
                <div class="character-chip" title="일각고래"><img src="/web/img/product/char_narwhal.png" alt="일각고래"></div>
                <div class="character-chip" title="우파루파"><img src="/web/img/product/char_axolotl.png" alt="우파루파"></div>
            </div>
        </div>
        `;
            } else if (resultData.category === 'BODY' || resultData.category === 'ACC') {
                // 바디필로우, 액세서리도 캐릭터 칩 영역(또는 설명)을 가등록하여 공간을 채움
                html += `
         <div class="result-colors">
             <div class="result-colors-label">다양한 컬러 지원</div>
             <div style="font-size: 13px; color: #333; line-height: 1.4; font-weight: 500; margin-bottom: 12px;">
                 컬러칩 추가부분
             </div>
             <div class="result-colors-row">
                 <span class="color-chip" style="background:#c8c8c8;" title="라이트 그레이"></span>
                 <span class="color-chip" style="background:#666;" title="다크 그레이"></span>
             </div>
         </div>
         `;
            }

            html += `</div>`; // .result-card 닫기

            container.innerHTML = html;

            document.getElementById('bottom-nav').classList.remove('active');
            showScreen('step-result');
        }

        function showScreen(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartQuiz() { startQuiz(); }

        function recordStep(q, a) {
            if (!sessionId) return;
            fetch(`${API}/api/event/session/${sessionId}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, answer: a }), keepalive: true
            }).catch(() => { });
        }
    </script>
</body>

</html>
