<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장안내 - 요기보</title>
    <!-- Kakao Map SDK -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=36f6c0f03cdd941bf5afd25f98f8092f&libraries=services"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Outfit:wght@600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fff;
            color: #222;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Point Bar (Top) with Logo ── */
        .point-bar {
            background: #E42528;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
        }

        .point-bar-logo {
            display: flex;
            align-items: center;
        }

        .point-bar-logo svg {
            height: 26px;
            width: auto;
        }

        /* ── Navigation ── */
        .nav-bar {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 700;
            color: #222;
            letter-spacing: -0.02em;
        }

        .nav-filters {
            display: flex;
            gap: 6px;
        }

        .nav-filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid #e0e0e0;
            background: #fff;
            font-size: 13px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-filter-btn svg {
            width: 14px;
            height: 14px;
        }

        .nav-filter-btn:hover {
            border-color: #E42528;
            color: #E42528;
        }

        .nav-filter-btn:hover svg {
            fill: #E42528;
        }

        .nav-filter-btn.active {
            background: #222;
            border-color: #222;
            color: #fff;
        }

        .nav-filter-btn.active svg {
            fill: #fff;
        }

        /* ── Container ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Store Entry ── */
        .store-entry {
            padding: 16px 0;
            border-bottom: 1px solid #e5e5e5;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .store-entry:last-child {
            border-bottom: none;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Row 1: Name + Address */
        .store-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 6px;
            padding-right: 40px;
        }

        .store-name-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .store-name {
            font-size: 22px;
            font-weight: 800;
            color: #111;
            letter-spacing: -0.03em;
            line-height: 1.3;
        }

        .store-pin {
            height: 20px;
            width: auto;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Feature Badges */
        .store-badges {
            display: inline-flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .s-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .s-badge svg {
            width: 13px;
            height: 13px;
        }

        .s-badge-popup {
            background: #FFF0E6;
            color: #D4620A;
        }

        .s-badge-popup svg {
            fill: #D4620A;
        }

        .s-badge-pickup {
            background: #E8F8EE;
            color: #1A8A47;
        }

        .s-badge-pickup svg {
            fill: #1A8A47;
        }

        .s-badge-modju {
            background: #F0ECFF;
            color: #6838D9;
        }

        .s-badge-modju svg {
            fill: #6838D9;
        }

        .s-badge-new {
            background: #E42528;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .store-address {
            font-size: 14px;
            color: #666;
            text-align: right;
            line-height: 1.5;
            flex-shrink: 0;
            max-width: 420px;
            padding-top: 4px;
        }

        /* Row 2: Phone */
        .store-summary {
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            transition: background 0.2s;
            margin: -12px;
            position: relative;
        }

        .store-summary:hover {
            background: #fdfdfd;
        }

        .store-sub-info {
            font-size: 14px;
            color: #999;
            margin-bottom: 0px;
            padding-right: 40px;
        }
        
        .toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            fill: #666;
            transition: transform 0.3s ease;
        }

        .store-summary.open .toggle-icon {
            transform: translateY(-50%) rotate(180deg);
        }

        /* Row 3: Image + Map */
        .store-content {
            display: grid;
            grid-template-columns: 4fr 6fr;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e8e8e8;
            height: 300px;
            margin-top: 16px;
        }

        .store-image-area {
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
            height: 100%;
        }

        .store-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .store-entry:hover .store-image-area img {
            transform: scale(1.02);
        }

        .store-map-area {
            position: relative;
        }

        .store-map-area > div {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .map-link-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            transition: all 0.2s;
            z-index: 5;
        }

        .map-link-overlay:hover {
            background: #fff;
            color: #E42528;
        }

        .map-link-overlay svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ── Loading / Empty ── */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: #aaa;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #eee;
            border-top-color: #E42528;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #bbb;
            font-size: 15px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .point-bar {
                height: 44px;
            }

            .point-bar-logo svg {
                height: 20px;
            }

            .nav-bar {
                height: auto;
                padding: 12px 16px;
            }

            .nav-inner {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .nav-filters {
                flex-wrap: wrap;
            }

            .container {
                padding: 0 16px;
            }

            .store-entry {
                padding: 16px 0;
            }

            .store-header {
                flex-direction: column;
                gap: 4px;
            }

            .store-name {
                font-size: 18px;
            }

            .store-address {
                text-align: left;
                max-width: 100%;
                font-size: 13px;
            }

            .store-content {
                grid-template-columns: 1fr;
                height: auto;
            }

            .store-image-area {
                height: 220px;
            }

            .store-map-area > div {
                min-height: 260px;
            }
        }

        @media (max-width: 480px) {
            .store-name {
                font-size: 16px;
            }

            .store-sub-info {
                font-size: 13px;
            }

            .s-badge {
                font-size: 11px;
                padding: 3px 8px;
            }

            .store-image-area {
                height: 180px;
            }
        }
    </style>
</head>

<body>



    <!-- Sticky Nav -->
    <nav class="nav-bar">
        <div class="nav-inner">
            <div class="nav-title">매장 안내</div>
            <div class="nav-filters">
                <button class="nav-filter-btn active" data-filter="all" onclick="setFilter('all', this)">전체</button>
                <button class="nav-filter-btn" data-filter="popup" onclick="setFilter('popup', this)">
                    <img src="https://yogibo.kr/web/img/map/icon/icon_store_map_2icon4_on.png" alt="팝업" style="width:20px; height:20px; object-fit:contain;">
                    팝업스토어
                </button>
                <button class="nav-filter-btn" data-filter="pickup" onclick="setFilter('pickup', this)">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2h-4c0-1.1.9-2 2-2zm6 14H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v10z" />
                    </svg>
                    픽업 가능
                </button>
                <button class="nav-filter-btn" data-filter="modju" onclick="setFilter('modju', this)">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z" />
                    </svg>
                    모듀 입점
                </button>
            </div>
        </div>
    </nav>

    <!-- Search Bar -->
    <div class="container" style="margin-top: 24px;">
        <div class="search_w_bar" style="max-width:400px; margin: 0 auto 24px auto;">
            <div class="search_inner" style="display:flex; border:2px solid #222; border-radius:30px; overflow:hidden; padding:4px 16px;">
                <input type="text" id="searchInput" placeholder="매장 명칭 또는 지역 검색" onkeyup="if(event.keyCode===13) executeSearch()" style="width:100%; border:none; outline:none; font-size:14px; padding:8px 0; font-family:inherit;">
                <button onclick="executeSearch()" style="background:none; border:none; cursor:pointer; padding: 0 8px;">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#222;">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Store List -->
    <div class="container">
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>매장 정보를 불러오는 중...</p>
        </div>
        <div id="storeList"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            현재 조건에 맞는 매장이 없습니다.
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.85); flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <div style="width:100%; max-width:800px; text-align:right; margin-bottom:12px;">
            <button onclick="closeVideoModal()" style="background:rgba(255,255,255,0.1); border:none; color:#fff; cursor:pointer; width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div id="videoModalContent" style="width:100%; max-width:800px; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden;"></div>
    </div>

    <script>
        const API_URL = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app/api/store?filterActive=true';

        let allStores = [];
        let currentFilter = 'all';
        let searchQuery = '';

        function executeSearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilters();
        }

        async function fetchStores() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('loadingState').style.display = 'none';

                if (data.success && data.stores.length > 0) {
                    allStores = data.stores;
                    renderStores(allStores);
                } else {
                    showEmpty();
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loadingState').style.display = 'none';
                showEmpty();
            }
        }

        function setFilter(filter, btnEl) {
            currentFilter = filter;
            document.querySelectorAll('.nav-filter-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            let filtered = allStores;
            
            if (currentFilter === 'popup') filtered = filtered.filter(s => s.isPopup);
            else if (currentFilter === 'pickup') filtered = filtered.filter(s => s.isPickup);
            else if (currentFilter === 'modju') filtered = filtered.filter(s => s.isModju);

            if (searchQuery) {
                filtered = filtered.filter(s => 
                    (s.name && s.name.toLowerCase().includes(searchQuery)) || 
                    (s.address && s.address.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                document.getElementById('storeList').innerHTML = '';
                showEmpty();
            } else {
                document.getElementById('emptyState').style.display = 'none';
                renderStores(filtered);
            }
        }

        function showEmpty() {
            document.getElementById('emptyState').style.display = 'block';
        }

        function getKoreanDay(date) {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return days[date.getDay()];
        }

        function formatEventDate(startStr, endStr) {
            if (!startStr || !endStr) return '';
            const s = new Date(startStr);
            const e = new Date(endStr);
            
            const sYear = s.getFullYear();
            const sMonth = String(s.getMonth() + 1).padStart(2, '0');
            const sDate = String(s.getDate()).padStart(2, '0');
            const sDay = getKoreanDay(s);
            
            const eYear = e.getFullYear();
            const eMonth = String(e.getMonth() + 1).padStart(2, '0');
            const eDate = String(e.getDate()).padStart(2, '0');
            const eDay = getKoreanDay(e);
            
            if (sYear === eYear) {
                return `${sYear}년 ${sMonth}월 ${sDate}일(${sDay}) ~ ${eMonth}월 ${eDate}일(${eDay})`;
            } else {
                return `${sYear}년 ${sMonth}월 ${sDate}일(${sDay}) ~ ${eYear}년 ${eMonth}월 ${eDate}일(${eDay})`;
            }
        }

        function getYoutubeEmbedUrl(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}`;
            }
            return url; // fallback if not recognized
        }

        window.openVideoModal = function(e, embedUrl) {
            e.stopPropagation();
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('videoModalContent');
            content.innerHTML = `<iframe width="100%" height="100%" src="${embedUrl}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            modal.style.display = 'flex';
        };

        window.closeVideoModal = function() {
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('videoModalContent');
            modal.style.display = 'none';
            content.innerHTML = '';
        };

        function renderStores(stores) {
            const list = document.getElementById('storeList');
            list.innerHTML = '';

            stores.forEach((store, i) => {
                const imgSrc = store.imagePath || 'https://via.placeholder.com/800x500/f0f0f0/ccc?text=Yogibo+Store';
                const encodedAddr = encodeURIComponent(store.address);
                const mapsLink = `https://map.kakao.com/link/search/${encodedAddr}`;
                const mapId = 'map-' + i;

                let badgesHTML = '';
                if (store.isPopup) badgesHTML += `<span class="s-badge s-badge-popup" style="display:inline-flex;align-items:center;gap:3px;"><img src="https://yogibo.kr/web/img/map/icon/icon_store_map_2icon4_on.png" style="width:14px; height:14px; object-fit:contain;" alt="">팝업</span>`;
                if (store.isPickup) badgesHTML += `<span class="s-badge s-badge-pickup"><svg viewBox="0 0 24 24"><path d="M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2h-4c0-1.1.9-2 2-2zm6 14H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v10z"/></svg>픽업</span>`;
                if (store.isModju) badgesHTML += `<span class="s-badge s-badge-modju"><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>모듀</span>`;

                let eventPeriodHTML = '';
                if (!store.isAlways && store.isPopup && store.startDate && store.endDate) {
                    eventPeriodHTML = `
                    <div class="store-period" style="margin-top:8px; font-size:14px; color:var(--yogibo-dark); display:flex; align-items:flex-start; gap:6px;">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--yogibo-gray)" style="margin-top:2px; flex-shrink:0;"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.89 4 3 4.9 3 6v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
                        <span>${formatEventDate(store.startDate, store.endDate)}</span>
                    </div>`;
                }

                let videoHTML = '';
                if (store.youtubeUrl) {
                    const embedUrl = getYoutubeEmbedUrl(store.youtubeUrl);
                    if (embedUrl.includes('youtube.com/embed/')) {
                        videoHTML = `
                        <button onclick="openVideoModal(event, '${embedUrl}')" style="display:inline-flex; align-items:center; gap:4px; background:#fff; color:#E52528; border:1px solid #E52528; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; cursor:pointer;" title="영상으로 길찾기 확인">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09s-.03 1.29-.1 2.09c-.06.8-.15 1.43-.28 1.9-.32 1.15-1.04 1.88-2.18 2.2-1.01.27-2.9.41-5.69.41s-4.68-.14-5.69-.41c-1.14-.32-1.85-1.05-2.18-2.2-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09s.03-1.29.1-2.09c.06-.8.15-1.43.28-1.9.32-1.15 1.04-1.88 2.18-2.2 1.01-.27 2.9-.41 5.69-.41s4.68.14 5.69.41c1.14.32 1.85 1.05 2.18 2.2z"/></svg>
                            영상으로 길찾기 확인
                        </button>`;
                    } else {
                        videoHTML = `
                        <a href="${store.youtubeUrl}" target="_blank" onclick="event.stopPropagation()" style="display:inline-flex; align-items:center; gap:4px; background:#fff; color:#E52528; border:1px solid #E52528; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; text-decoration:none;" title="영상으로 길찾기 확인">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09s-.03 1.29-.1 2.09c-.06.8-.15 1.43-.28 1.9-.32 1.15-1.04 1.88-2.18 2.2-1.01.27-2.9.41-5.69.41s-4.68-.14-5.69-.41c-1.14-.32-1.85-1.05-2.18-2.2-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09s.03-1.29.1-2.09c.06-.8.15-1.43.28-1.9.32-1.15 1.04-1.88 2.18-2.2 1.01-.27 2.9-.41 5.69-.41s4.68.14 5.69.41c1.14.32 1.85 1.05 2.18 2.2z"/></svg>
                            영상으로 길찾기 확인
                        </a>`;
                    }
                }

                const entry = document.createElement('div');
                entry.className = 'store-entry';
                entry.style.animationDelay = `${i * 0.08}s`;

                entry.innerHTML = `
                <div class="store-summary" onclick="toggleStore('${mapId}', '${encodedAddr}', this)">
                    <div class="store-header">
                        <div class="store-name-wrap">
                            <span class="store-name">${store.name}</span>
                            <img class="store-pin" src="https://yogibo.kr/web/img/map/icon/icon_store_map_icon11.png" alt="pin">
                            <div class="store-badges">${badgesHTML}</div>
                        </div>
                        <div class="store-address">${store.address}</div>
                    </div>
                    <div class="store-sub-info" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:14px;">
                        ${store.phone ? `<span style="display:flex; align-items:center;">
                            <img src="https://yogibo.kr/web/img/icon/map//icon-store-1-tel.svg" style="width:14px; height:14px; margin-right:4px;" alt="tel">
                            ${store.phone}
                        </span>` : ''}
                        ${videoHTML}
                    </div>
                    ${eventPeriodHTML}
                    <svg class="toggle-icon" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                </div>

                <div class="store-content" id="content-${mapId}" style="display: none;">
                    <div class="store-image-area">
                        <img src="${imgSrc}" alt="${store.name}"
                             onerror="this.src='https://via.placeholder.com/800x500/f0f0f0/ccc?text=No+Image'">
                    </div>
                    <div class="store-map-area">
                        <div id="${mapId}" style="width:100%; height:100%;"></div>
                        <a href="${mapsLink}" target="_blank" rel="noopener" class="map-link-overlay">
                            <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                            카카오맵 크게 보기
                        </a>
                    </div>
                </div>
            `;

                list.appendChild(entry);
            });
        }

        const initializedMaps = new Set();

        window.toggleStore = function(mapId, addressEncoded, element) {
            const content = document.getElementById('content-' + mapId);
            const isHidden = content.style.display === 'none';
            
            if (isHidden) {
                content.style.display = 'grid';
                element.classList.add('open');
                if (!initializedMaps.has(mapId)) {
                    initializedMaps.add(mapId);
                    initializeKakaoMap(mapId, decodeURIComponent(addressEncoded));
                }
            } else {
                content.style.display = 'none';
                element.classList.remove('open');
            }
        };

        function initializeKakaoMap(mapId, address) {
            const mapContainer = document.getElementById(mapId);
            const geocoder = new kakao.maps.services.Geocoder();
            
            geocoder.addressSearch(address, function(result, status) {
                 if (status === kakao.maps.services.Status.OK) {
                      const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                      const mapOption = { center: coords, level: 3 };
                      const map = new kakao.maps.Map(mapContainer, mapOption);
                      
                      const imageSrc = 'https://yogibo.kr/web/img/map/icon/icon_store_map_icon11.png';
                      const imageSize = new kakao.maps.Size(80, 80);
                      const imageOption = { offset: new kakao.maps.Point(27, 69) };
                      const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);
                      
                      new kakao.maps.Marker({
                          map: map, position: coords, image: markerImage
                      });
                 } else {
                      mapContainer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#f5f5f5;color:#999;font-size:14px;">지도 위치를 찾을 수 없습니다.</div>';
                 }
            });
        }

        document.addEventListener('DOMContentLoaded', fetchStores);
    </script>

</body>

</html>
