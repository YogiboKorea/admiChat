<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>봄꽃룰렛 이벤트 참여자 현황</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f7fa;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #333;
      padding-bottom: 15px;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 15px 20px;
      border-radius: 6px;
      border: 1px solid #e9ecef;
      flex: 1;
      text-align: center;
    }
    .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #6c757d; }
    .stat-card p { margin: 0; font-size: 24px; font-weight: bold; color: #FC6C98; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 12px 15px;
      text-align: center;
    }
    th {
      background-color: #f8fafc;
      font-weight: 600;
      color: #475569;
    }
    tr:nth-child(even) { background-color: #fbfbfc; }
    tr:hover { background-color: #f1f5f9; }
    
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge.yes { background-color: #d1fae5; color: #047857; }
    .badge.no { background-color: #f1f5f9; color: #64748b; }
    .badge.prize1 { background-color: #fee2e2; color: #b91c1c; }
    .badge.prize { background-color: #e0e7ff; color: #4338ca; }
  </style>
</head>
<body>

<div class="container">
  <h1>🌺 봄꽃룰렛 이벤트 관리자 대시보드</h1>
  
  <div class="stat-card" style="margin-bottom: 20px; text-align: left;">
    <h3>🎲 룰렛 당첨 확률 설정</h3>
    <div style="display:flex; gap:15px; align-items:center; margin-top: 10px;">
      <label>1등(%) <input type="number" id="prob1" style="width:60px; padding:5px; border:1px solid #ccc; border-radius:4px;"></label>
      <label>2등(%) <input type="number" id="prob2" style="width:60px; padding:5px; border:1px solid #ccc; border-radius:4px;"></label>
      <label>3등(%) <input type="number" id="prob3" style="width:60px; padding:5px; border:1px solid #ccc; border-radius:4px;"></label>
      <button onclick="updateProbabilities()" style="padding:6px 15px; background:#FC6C98; color:white; border:none; border-radius:4px; cursor:pointer;">설정 저장</button>
    </div>
    <p id="probMessage" style="color:#047857; font-size:13px; margin-top:10px; display:none;"></p>
  </div>

  <div style="background:#fff; padding:15px; border-radius:6px; border:1px solid #e9ecef; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <label style="font-weight:600; margin-right:10px;">기간 조회:</label>
      <input type="date" id="startDate" style="padding:6px; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
      <span style="margin:0 5px;">~</span>
      <input type="date" id="endDate" style="padding:6px; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
      <button onclick="loadData()" style="margin-left:10px; padding:7px 16px; background:#475569; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">조회</button>
    </div>
    <button onclick="downloadExcel()" style="padding:7px 18px; background:#10b981; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px;">📑 엑셀 다운로드</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <h3>총 참여자</h3>
      <p id="totalCount">0명</p>
    </div>
    <div class="stat-card">
      <h3>장바구니 이동</h3>
      <p id="cartCount">0명</p>
    </div>
    <div class="stat-card">
      <h3>결제 페이지 도달</h3>
      <p id="purchaseCount">0명</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>No.</th>
        <th>회원 ID</th>
        <th>당첨 경품</th>
        <th>응모일</th>
        <th>장바구니(basket)</th>
        <th>결제완료(order_result)</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6">데이터를 불러오는 중입니다...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API_BASE_URL = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app';

  function formatDate(isoString) {
    if (!isoString) return '-';
    const date = new Date(isoString);
    return date.getFullYear() + '-' + 
           String(date.getMonth() + 1).padStart(2, '0') + '-' + 
           String(date.getDate()).padStart(2, '0') + ' ' + 
           String(date.getHours()).padStart(2, '0') + ':' + 
           String(date.getMinutes()).padStart(2, '0');
  }

  async function loadData() {
    try {
      const sDate = document.getElementById('startDate').value;
      const eDate = document.getElementById('endDate').value;
      
      const url = new URL(`${API_BASE_URL}/api/raffle/admin/participants`);
      if (sDate) url.searchParams.append('startDate', sDate);
      if (eDate) url.searchParams.append('endDate', eDate);

      const response = await fetch(url);
      const result = await response.json();
      
      if (!result.success) {
        alert('데이터를 불러오는데 실패했습니다.');
        return;
      }

      const data = result.data;
      const tbody = document.getElementById('tableBody');
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">참여 내역이 없습니다.</td></tr>';
        return;
      }

      let cartTotal = 0;
      let purchaseTotal = 0;

      tbody.innerHTML = data.map((item, index) => {
        if (item.hasCart) cartTotal++;
        if (item.hasPurchase) purchaseTotal++;

        const prizeClass = item.optionName === '1등' ? 'prize1' : 'prize';
        
        return `
          <tr>
            <td>${data.length - index}</td>
            <td style="font-weight:500;">${item.userId}</td>
            <td><span class="badge ${prizeClass}">${item.optionName}</span></td>
            <td>${formatDate(item.createdAt)}</td>
            <td>${item.hasCart ? '<span class="badge yes">O</span>' : '<span class="badge no">X</span>'}</td>
            <td>${item.hasPurchase ? '<span class="badge yes">O</span>' : '<span class="badge no">X</span>'}</td>
          </tr>
        `;
      }).join('');

      document.getElementById('totalCount').innerText = `${data.length}명`;
      document.getElementById('cartCount').innerText = `${cartTotal}명`;
      document.getElementById('purchaseCount').innerText = `${purchaseTotal}명`;

    } catch (err) {
      console.error(err);
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="color:red;">에러 발생! 콘솔을 확인해주세요.</td></tr>';
    }
  }

  async function loadProbConfig() {
    try {
      const res = await fetch(`${API_BASE_URL}/api/raffle/probability`);
      const result = await res.json();
      if(result.success && result.data) {
        document.getElementById('prob1').value = result.data.p1;
        document.getElementById('prob2').value = result.data.p2;
        document.getElementById('prob3').value = result.data.p3;
      }
    } catch(err) { console.error('확률 설정 로드 실패', err); }
  }

  async function updateProbabilities() {
    const p1 = Number(document.getElementById('prob1').value);
    const p2 = Number(document.getElementById('prob2').value);
    const p3 = Number(document.getElementById('prob3').value);

    if (p1 + p2 + p3 !== 100) {
      alert('확률의 합은 100%가 되어야 합니다.');
      return;
    }

    try {
      const res = await fetch(`${API_BASE_URL}/api/raffle/probability`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ p1, p2, p3 })
      });
      const result = await res.json();
      if(result.success) {
        const msg = document.getElementById('probMessage');
        msg.innerText = '✅ 확률이 성공적으로 변경되었습니다.';
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
      }
    } catch(err) {
      alert('확률 수정 중 요류 발생!');
    }
  }

  window.onload = () => {
    // 기본 날짜를 이번 달로 설정
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];

    loadData();
    loadProbConfig();
  };

  function downloadExcel() {
    const sDate = document.getElementById('startDate').value;
    const eDate = document.getElementById('endDate').value;
    let url = `${API_BASE_URL}/api/raffle/admin/excel`;
    const params = [];
    if (sDate) params.push(`startDate=${sDate}`);
    if (eDate) params.push(`endDate=${eDate}`);
    if (params.length > 0) url += '?' + params.join('&');
    
    window.location.href = url;
  }
</script>

</body>
</html>
