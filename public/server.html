<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배너 클릭 히트맵 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #1e3a5f;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
        .header h1 span { color: #38bdf8; }

        .filter-bar {
            background: #1e293b;
            border-bottom: 1px solid #1e3a5f;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .filter-bar label { font-size: 13px; color: #94a3b8; font-weight: 500; }
        .filter-bar select, .filter-bar input[type="date"] {
            background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
            padding: 7px 12px; border-radius: 8px; font-size: 13px; font-family: inherit;
        }
        .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #38bdf8; }
        .divider { width: 1px; height: 28px; background: #334155; }
        .btn-reset {
            background: transparent; border: 1px solid #334155; color: #94a3b8;
            padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s;
        }
        .btn-reset:hover { border-color: #38bdf8; color: #38bdf8; }
        .btn-show-archived {
            background: transparent; border: 1px solid #334155; color: #64748b;
            padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s;
        }
        .btn-show-archived.active { border-color: #f59e0b; color: #f59e0b; }

        .main {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 118px);
            overflow: hidden;
        }

        .sidebar {
            background: #1e293b; border-right: 1px solid #1e3a5f;
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 16px 20px; font-size: 12px; font-weight: 600; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.08em;
            border-bottom: 1px solid #1e3a5f;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: #1e293b; z-index: 10;
        }
        .total-badge {
            background: #0f172a; color: #38bdf8; font-size: 11px;
            padding: 3px 10px; border-radius: 20px; border: 1px solid #1e3a5f;
        }

        .banner-item {
            padding: 14px 20px; border-bottom: 1px solid #1e3a5f;
            cursor: pointer; transition: all 0.15s; position: relative;
            display: flex; flex-direction: column; gap: 8px;
        }
        .banner-item:hover { background: #243552; }
        .banner-item.active { background: #1e3a5f; border-left: 3px solid #38bdf8; }
        .banner-item.archived { opacity: 0.4; }

        .item-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .banner-name { font-size: 13px; font-weight: 600; color: #e2e8f0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .device-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
        .device-tag.pc { background: #1e3a5f; color: #38bdf8; }
        .device-tag.mobile { background: #2d1b4e; color: #a78bfa; }

        .btn-archive {
            background: transparent; border: 1px solid #334155; color: #64748b;
            padding: 2px 8px; border-radius: 6px; cursor: pointer;
            font-size: 10px; font-family: inherit; transition: all 0.2s; flex-shrink: 0;
        }
        .btn-archive:hover { border-color: #ef4444; color: #ef4444; }
        .btn-archive.is-archived { border-color: #f59e0b; color: #f59e0b; }
        .btn-archive.is-archived:hover { border-color: #22c55e; color: #22c55e; }

        .click-count-row { display: flex; align-items: center; gap: 10px; }
        .click-bar-bg { flex: 1; height: 5px; background: #0f172a; border-radius: 99px; overflow: hidden; }
        .click-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #38bdf8, #818cf8); transition: width 0.6s ease; }
        .click-count-label { font-size: 12px; font-weight: 700; color: #38bdf8; min-width: 45px; text-align: right; }

        .loading-text { padding: 40px 20px; text-align: center; color: #475569; font-size: 14px; }

        /* 우측 뷰어 */
        .viewer { background: #0f172a; display: flex; flex-direction: column; overflow: hidden; }
        .viewer-header {
            padding: 16px 24px; border-bottom: 1px solid #1e3a5f;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .viewer-title { font-size: 14px; font-weight: 600; color: #94a3b8; }
        .viewer-title strong { color: #f1f5f9; }
        .btn-clear {
            background: transparent; border: 1px solid #334155; color: #64748b;
            padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s;
        }
        .btn-clear:hover { border-color: #ef4444; color: #ef4444; }

        .viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 24px; }
        
        .banner-wrapper { position: relative; display: inline-block; max-width: 100%; }
        .banner-wrapper img { display: block; max-width: 100%; max-height: calc(100vh - 250px); object-fit: contain; border-radius: 8px; }
        .empty-state { text-align: center; color: #475569; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }

        /* 히트맵 닷 - 더 선명한 색상 */
        .heatmap-dot {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        /* 싱글 닷: 선명한 형광 그라디언트 */
        .heatmap-dot.single {
            width: 30px; height: 30px;
            background: radial-gradient(circle,
                rgba(255, 255, 0, 1) 0%,
                rgba(255, 100, 0, 0.9) 35%,
                rgba(255, 0, 80, 0.6) 65%,
                rgba(255, 0, 80, 0) 100%
            );
        }
        /* 중복 닷: 더 강렬한 색상 */
        .heatmap-dot.hot {
            width: 36px; height: 36px;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 1) 0%,
                rgba(255, 220, 0, 1) 20%,
                rgba(255, 60, 0, 0.95) 55%,
                rgba(255, 0, 0, 0) 100%
            );
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; grid-template-rows: 300px 1fr; height: auto; }
            .sidebar { height: 300px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 배너 클릭 <span>히트맵</span> 대시보드</h1>
    <div style="font-size:12px; color:#475569;">실시간 클릭 분포도 분석</div>
</div>

<div class="filter-bar">
    <label>기기</label>
    <select id="filter-device" onchange="fetchSummary()">
        <option value="all">전체</option>
        <option value="pc">💻 PC</option>
        <option value="mobile">📱 모바일</option>
    </select>
    <div class="divider"></div>
    <label>기간</label>
    <input type="date" id="filter-start" onchange="fetchSummary()">
    <span style="color:#475569; font-size:13px;">~</span>
    <input type="date" id="filter-end" onchange="fetchSummary()">
    <div class="divider"></div>
    <button class="btn-reset" onclick="resetFilters()">초기화</button>
    <button class="btn-show-archived" id="btn-toggle-archived" onclick="toggleShowArchived()">🗃 숨김 항목 보기</button>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">
            배너별 클릭 통계
            <span class="total-badge" id="total-badge">총 0건</span>
        </div>
        <div id="banner-list">
            <div class="loading-text">데이터를 불러오는 중...</div>
        </div>
    </div>

    <div class="viewer">
        <div class="viewer-header">
            <div class="viewer-title" id="viewer-title">← 좌측에서 배너를 선택하세요</div>
            <button class="btn-clear" onclick="clearHeatmap()">히트맵 지우기</button>
        </div>
        <div class="viewer-body">
            <div class="banner-wrapper" id="banner-wrapper">
                <div class="empty-state">
                    <div class="icon">🎯</div>
                    <p>배너를 선택하면 클릭 분포도가 표시됩니다.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app';
    let summaryData = [];
    let archivedSet = new Set(); // "bannerId__deviceType" 형태
    let showArchived = false;

    async function loadArchivedList() {
        try {
            const res = await fetch(`${API_BASE_URL}/api/banner-archive`);
            const json = await res.json();
            archivedSet = new Set((json.data || []).map(a => `${a.bannerId}__${a.deviceType || 'pc'}`));
        } catch(e) { archivedSet = new Set(); }
    }

    function toggleShowArchived() {
        showArchived = !showArchived;
        const btn = document.getElementById('btn-toggle-archived');
        btn.classList.toggle('active', showArchived);
        btn.textContent = showArchived ? '🗃 숨김 항목 숨기기' : '🗃 숨김 항목 보기';
        renderList();
    }

    function resetFilters() {
        document.getElementById('filter-device').value = 'all';
        document.getElementById('filter-start').value = '';
        document.getElementById('filter-end').value = '';
        fetchSummary();
    }

    async function fetchSummary() {
        const listEl = document.getElementById('banner-list');
        listEl.innerHTML = '<div class="loading-text">불러오는 중...</div>';

        const params = new URLSearchParams();
        const dev = document.getElementById('filter-device').value;
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        if (dev !== 'all') params.append('deviceType', dev);
        if (start) params.append('startDate', start);
        if (end) params.append('endDate', end);

        try {
            await loadArchivedList();
            const res = await fetch(`${API_BASE_URL}/api/track-click/summary?${params}`);
            const json = await res.json();

            if (!json.success || json.data.length === 0) {
                listEl.innerHTML = '<div class="loading-text">조건에 맞는 데이터가 없습니다.</div>';
                document.getElementById('total-badge').textContent = '총 0건';
                summaryData = [];
                return;
            }

            summaryData = json.data;
            renderList();
        } catch(err) {
            listEl.innerHTML = '<div class="loading-text">통신 오류가 발생했습니다.</div>';
        }
    }

    function renderList() {
        const listEl = document.getElementById('banner-list');
        // 표시할 데이터만 필터 (아카이브 여부)
        const visible = summaryData.filter(item => {
            const key = `${item.bannerId || item._id}__${item.deviceType || 'pc'}`;
            const isArc = archivedSet.has(key);
            return showArchived ? true : !isArc;
        });

        const totalClicks = visible.reduce((s, i) => s + i.clickCount, 0);
        const maxClicks = visible.length > 0 ? Math.max(...visible.map(i => i.clickCount)) : 0;
        document.getElementById('total-badge').textContent = `총 ${totalClicks.toLocaleString()}건`;

        listEl.innerHTML = '';

        if (visible.length === 0) {
            listEl.innerHTML = '<div class="loading-text">표시할 항목이 없습니다.</div>';
            return;
        }

        visible.forEach((item, displayIdx) => {
            const actualIdx = summaryData.indexOf(item);
            const bannerId = item.bannerId || item._id || '알 수 없음';
            let name = bannerId;
            try { name = decodeURIComponent(bannerId); } catch(e) {}
            const devType = item.deviceType || 'pc';
            const pct = maxClicks > 0 ? Math.round((item.clickCount / maxClicks) * 100) : 0;
            const key = `${bannerId}__${devType}`;
            const isArc = archivedSet.has(key);

            const div = document.createElement('div');
            div.className = 'banner-item' + (isArc ? ' archived' : '');
            div.dataset.index = actualIdx;
            div.innerHTML = `
                <div class="item-header">
                    <span class="banner-name" title="${name}">${name}</span>
                    <div class="item-actions">
                        <span class="device-tag ${devType}">${devType === 'mobile' ? '📱 모바일' : '💻 PC'}</span>
                        <button class="btn-archive ${isArc ? 'is-archived' : ''}"
                            data-banner="${encodeURIComponent(bannerId)}" data-dev="${devType}"
                            onclick="toggleArchive(event, '${encodeURIComponent(bannerId)}', '${devType}')">
                            ${isArc ? '복원' : '숨기기'}
                        </button>
                    </div>
                </div>
                <div class="click-count-row">
                    <div class="click-bar-bg"><div class="click-bar-fill" style="width:${pct}%"></div></div>
                    <span class="click-count-label">${item.clickCount.toLocaleString()}회</span>
                </div>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-archive')) return;
                selectBanner(actualIdx);
            });
            listEl.appendChild(div);
        });

        // 첫 번째 자동 선택
        if (visible.length > 0) {
            selectBanner(summaryData.indexOf(visible[0]));
        }
    }

    async function toggleArchive(e, encodedBannerId, devType) {
        e.stopPropagation();
        const bannerId = decodeURIComponent(encodedBannerId);
        try {
            const res = await fetch(`${API_BASE_URL}/api/banner-archive`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bannerId, deviceType: devType })
            });
            const json = await res.json();
            if (json.success) {
                const key = `${bannerId}__${devType}`;
                if (json.archived) { archivedSet.add(key); }
                else { archivedSet.delete(key); }
                renderList();
            }
        } catch(err) { console.error('아카이브 오류', err); }
    }

    function selectBanner(idx) {
        document.querySelectorAll('.banner-item').forEach(el => el.classList.remove('active'));
        const el = document.querySelector(`.banner-item[data-index="${idx}"]`);
        if (el) el.classList.add('active');
        loadHeatmap(idx);
    }

    async function loadHeatmap(idx) {
        const item = summaryData[idx];
        if (!item) return;

        const bannerId = item.bannerId || item._id;
        const devType = item.deviceType || 'pc';
        let name = bannerId;
        try { name = decodeURIComponent(bannerId); } catch(e) {}

        document.getElementById('viewer-title').innerHTML =
            `<strong>${name}</strong> · ${devType === 'mobile' ? '📱 모바일' : '💻 PC'} · <span style="color:#38bdf8">${item.clickCount.toLocaleString()}회 클릭</span>`;

        const wrapper = document.getElementById('banner-wrapper');
        clearHeatmapDots();
        wrapper.innerHTML = '';

        const imgEl = document.createElement('img');
        imgEl.src = item.imageUrl || '';
        imgEl.alt = name;
        imgEl.onerror = () => { imgEl.style.display='none'; };
        wrapper.appendChild(imgEl);

        const params = new URLSearchParams({ bannerId, deviceType: devType });
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        if (start) params.append('startDate', start);
        if (end) params.append('endDate', end);

        try {
            const res = await fetch(`${API_BASE_URL}/api/track-click?${params}`);
            const json = await res.json();
            if (json.success && json.data.length > 0) {
                imgEl.onload = () => drawDots(json.data, imgEl, wrapper);
                if (imgEl.complete) drawDots(json.data, imgEl, wrapper);
            }
        } catch(e) {}
    }

    function drawDots(clicks, imgEl, wrapper) {
        clearHeatmapDots();
        const W = imgEl.clientWidth;
        const H = imgEl.clientHeight;

        // 좌표별로 클릭 횟수 카운트 (같은 위치 중복 클릭 감지)
        const posMap = {};
        clicks.forEach(c => {
            if (!c.coordinates || !c.screenSize) return;
            const x = Math.round((c.coordinates.x / c.screenSize.width) * W);
            const y = Math.round((c.coordinates.y / c.screenSize.height) * H);
            const key = `${Math.round(x/15)*15}_${Math.round(y/15)*15}`; // 15px 격자로 묶음
            posMap[key] = (posMap[key] || 0) + 1;
        });

        clicks.forEach(c => {
            if (!c.coordinates || !c.screenSize) return;
            const x = (c.coordinates.x / c.screenSize.width) * W;
            const y = (c.coordinates.y / c.screenSize.height) * H;
            const key = `${Math.round(x/15)*15}_${Math.round(y/15)*15}`;
            const count = posMap[key] || 1;

            const dot = document.createElement('div');
            dot.className = 'heatmap-dot ' + (count >= 2 ? 'hot' : 'single');
            dot.style.left = `${x}px`;
            dot.style.top = `${y}px`;
            wrapper.appendChild(dot);
        });
    }

    function clearHeatmapDots() { document.querySelectorAll('.heatmap-dot').forEach(d => d.remove()); }
    function clearHeatmap() {
        clearHeatmapDots();
        const img = document.querySelector('#banner-wrapper img');
        if (img) img.src = '';
    }

    window.addEventListener('DOMContentLoaded', fetchSummary);
</script>
</body>
</html>
