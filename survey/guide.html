<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요기보 사용법</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --primary-color: #55B5C9;
            /* Yogibo Blue */
            --bg-color: #f7f9fa;
            --text-color: #1a1a1a;
            --border-color: #e0e6ed;
            --container-shadow: 0 15px 40px rgba(85, 181, 201, 0.1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
        }

        .survey-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            box-shadow: var(--container-shadow);
            border-radius: 32px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 70vh;
            padding-top: 20px;
        }

        .content-wrap {
            padding: 80px 24px 40px 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            position: relative;
        }

        /* 헤더 로고 */
        .logo {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .logo img {
            width: 130px;
            height: auto;
            display: block;
            cursor: pointer;
        }

        /* 메인 타이틀 */
        .global-title {
            font-size: 26px;
            font-weight: 800;
            color: #111;
            margin-bottom: 16px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .global-desc {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        /* 비디오 카드 영역 */
        .video-card {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            border: 1px solid #eaeaea;
            padding: 24px 20px;
            margin-bottom: 20px;
            position: relative;
            text-align: center;
        }

        .card-subtitle {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            color: #000;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

        /* 16:9 비율 반응형 Iframe */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.2%;
            /* 16:9 비율 유지 */
            overflow: hidden;
            background-color: #000;
            z-index: 2;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 우측 하단 유니콘 마스코트 */
        .mascot-img {
            position: absolute;
            bottom: -35px;
            right: -25px;
            width: 150px;
            height: auto;
            z-index: 3;
            pointer-events: none;
        }

        /* 영상 더보기 링크 버튼 */
        .btn-more {
            display: inline-block;
            width: 100%;
            padding: 16px 20px;
            background-color: #fff;
            border: 1px solid #ccc;
            color: #333;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
            margin-top: 30px;
        }

        .btn-more:hover {
            transform: translateY(-2px);
            background-color: #55B5C9;
            border-color: #55B5C9;
            color: #fff;
        }

        /* 모바일 최적화 */
        @media (max-width: 500px) {
            body {
                padding: 0;
            }

            .survey-container {
                border-radius: 0;
                min-height: 100vh;
            }

            .content-wrap {
                padding: 80px 20px 24px 20px;
            }

            .global-title {
                font-size: 22px;
            }

            .global-desc {
                font-size: 14px;
            }

            .card-title {
                font-size: 18px;
            }

            .mascot-img {
                width: 120px;
                bottom: -20px;
                right: -15px;
            }
        }
    </style>
</head>

<body>
    <div class="survey-container">
        <div class="content-wrap">

            <!-- 상단 로고 -->
            <div class="logo" onclick="location.href='index.html'">
                <img src="https://yogibo.kr/web/img/icon/logo3_on.png" alt="Yogibo Mark">
            </div>

            <!-- 타이틀 문구 -->
            <div class="global-title">요기보 사용법</div>
            <div class="global-desc">의자, 침대, 소파, 리클라이너로 변신!<br>다양한 매력이 있는 요기보를 만나보세요.</div>

            <!-- 비디오 카드 -->
            <div class="video-card">
                <div class="card-subtitle">글로벌 No.1 베스트셀러</div>
                <div class="card-title">요기보 맥스 (Yogibo Max)</div>

                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/G96BecFbxg8?autoplay=1&mute=1"
                        title="🔎 Yogibo Guide | 요기보 맥스 Yogibo Max" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

                <!-- 첨부해주신 이미지의 '요기보 맥스 + 유니콘' 누끼 이미지가 있다면 아래 src 경로를 교체해주세요 -->
                <!-- <img class="mascot-img" src="유니콘배경투명이미지URL" alt="유니콘"> -->
            </div>

            <!-- 영상 더보기 묶음 버튼 -->
            <a href="https://youtube.com/playlist?list=PLTvqBOL6-lmaMV_9sKF1jFsKNssGxRYl1&si=QnPzxTt_-lJESjzA"
                class="btn-more" target="_blank" rel="noopener noreferrer">영상 더보기</a>

        </div>
    </div>
</body>

</html>
