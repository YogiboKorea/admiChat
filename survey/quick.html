<style>
/* 퀵 메뉴 오디오 버튼 (모든 페이지 공통) */
.quick-menu {
    position: fixed;
    bottom: 15%;
    left: 50%;
    margin-left: -220px; /* 컨테이너 가로(480px) 안쪽 왼쪽 하단에 맞춤 */
    z-index: 9999;
    background: #ffffff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    -webkit-tap-highlight-color: transparent;
}
.quick-menu:active { transform: scale(0.9); }
@media (hover: hover) and (pointer: fine) {
    .quick-menu:hover { transform: scale(1.05); }
}
.quick-menu .icon {
    width: 28px;
    height: 28px;
    background-image: url('https://yogibo.kr/web/img/0429/play_on.png');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    transition: all 0.2s;
}
.quick-menu.playing .icon {
    background-image: url('https://yogibo.kr/web/img/0429/play_off.png');
}

.quick-menu::after {
    content: "MUSIC";
    position: absolute;
    top: -24px;
    right: -10px;
    background: #e2e2e2;
    color: #111;
    padding: 4px 14px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: sans-serif;
    letter-spacing: -0.2px;
    pointer-events: none;
    z-index: 10;
}

.quick-menu::before {
    content: "";
    position: absolute;
    top: 2px;
    right: 14px;
    border-width: 6px;
    border-style: solid;
    border-color: #e2e2e2 transparent transparent transparent;
    pointer-events: none;
    z-index: 10;
}

.quick-menu.playing::after,
.quick-menu.playing::before {
    display: none;
}

.playing-anim {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 2px solid #55B5C9;
    box-sizing: border-box;
    animation: ripple 1.8s infinite cubic-bezier(0.1, 0.5, 0.3, 1);
}
@keyframes ripple {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
}
.quick-menu.playing .playing-anim { display: block; }

/* 모바일 화면일 때는 화면의 왼쪽 끝 기준으로 고정 */
@media (max-width: 500px) {
    .quick-menu {
        left: 20px;
        margin-left: 0;
        bottom: 30px;
    }
}
</style>

<!-- 배경 오디오 -->
<audio id="bg-audio" loop>
    <source src="https://yogico.cafe24.com/mp3/okr.mp3" type="audio/mpeg">
</audio>

<!-- 플로팅 재생 버튼 -->
<div class="quick-menu" id="audio-btn">
    <div class="playing-anim"></div>
    <div class="icon" id="audio-icon"></div>
</div>

<script>
(function() {
    const audioBtn = document.getElementById('audio-btn');
    const bgAudio = document.getElementById('bg-audio');



    let isPlaying = false;

    // 세션 스토리지에서 이전 상태 복구
    const savedTime = sessionStorage.getItem('bgAudioTime');
    const savedPlaying = sessionStorage.getItem('bgAudioPlaying');

    // 재생 상태 UI 업데이트 함수
    const setUIPlaying = (playing) => {
        isPlaying = playing;
        if(playing) {
            audioBtn.classList.add('playing');
        } else {
            audioBtn.classList.remove('playing');
        }
    };

    // 저장된 재생 위치가 있다면 해당 시간대로 이동
    if (savedTime) {
        bgAudio.currentTime = parseFloat(savedTime);
    }

    // 이전 페이지에서 음악이 재생 중이었다면 바로 이어서 재생
    if (savedPlaying === 'true') {
        setUIPlaying(true);
        // 정책상 사용자 첫 클릭 전에는 자동 재생 에러가 날 수 있음
        bgAudio.play().catch(err => {
            console.log("Audio autoplay prevented by browser policy:", err);
            setUIPlaying(false); // 재생 실패 시 다시 정지 상태로 표시
        });
    }

    // 클릭 시 재생 / 일시정지 토글
    audioBtn.addEventListener('click', () => {
        if (isPlaying) {
            bgAudio.pause();
            setUIPlaying(false);
        } else {
            bgAudio.play().then(() => {
                setUIPlaying(true);
            }).catch(err => {
                alert("브라우저 정책상 재생할 수 없거나 소스를 찾을 수 없습니다.");
            });
        }
    });

    // 페이지를 벗어날 때 현재 오디오 시간과 상태를 브라우저에 저장
    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('bgAudioTime', bgAudio.currentTime);
        sessionStorage.setItem('bgAudioPlaying', isPlaying);
    });
})();
</script>
