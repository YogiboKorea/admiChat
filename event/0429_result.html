<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 출시 알림 이벤트 관리</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            color: #2c3e50;
        }

        .btn-download {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-download:hover {
            background-color: #2ecc71;
        }

        .info-panel {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #2980b9;
        }

        .search-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .search-wrap input[type="date"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-search {
            background-color: #3498db;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-search:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #fff;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .result-count {
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>제품 출시 알림 이벤트(0429) 관리자 대시보드</h1>
        
        <div class="info-panel">
            <strong>안내:</strong><br>
            - 본 페이지는 0429 제품 출시 이벤트 알림 신청자 목록을 확인하는 관리자용 페이지입니다.<br>
            - 고객이 신청 시 자동으로 Cafe24 SMS/마케팅 수신 동의 처리가 완료됩니다.<br>
            - 아래 엑셀 다운로드 버튼을 클릭하여 전체 신청자 목록을 다운로드할 수 있습니다.
        </div>

        <div class="search-wrap">
            <label for="search-date"><strong>날짜 검색:</strong></label>
            <input type="date" id="search-date">
            <button class="btn-search" onclick="fetchList()">조회</button>
            <button class="btn-download" onclick="downloadExcel()" style="margin-left: auto;">
                📥 엑셀 다운로드
            </button>
        </div>

        <div class="result-count" id="result-count">총 0건의 신청 내역이 있습니다.</div>

        <table>
            <thead>
                <tr>
                    <th>신청 일시 (KST)</th>
                    <th>회원 아이디</th>
                    <th>마케팅/SMS 동의 여부</th>
                </tr>
            </thead>
            <tbody id="list-body">
                <tr><td colspan="3">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE_URL = 'https://port-0-admichat-lzgmwhc4d9883c97.sel4.cloudtype.app';

        // 페이지 로드 시 전체 리스트 가져오기
        document.addEventListener('DOMContentLoaded', () => {
            fetchList();
        });

        function fetchList() {
            const date = document.getElementById('search-date').value;
            let url = API_BASE_URL + '/api/event/0429/list';
            if (date) {
                url += '?date=' + encodeURIComponent(date);
            }

            document.getElementById('list-body').innerHTML = '<tr><td colspan="3">데이터를 불러오는 중입니다...</td></tr>';

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderTable(data.list);
                    } else {
                        alert('리스트 조회 중 오류가 발생했습니다.');
                    }
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    document.getElementById('list-body').innerHTML = '<tr><td colspan="3">서버 통신 오류</td></tr>';
                });
        }

        function renderTable(list) {
            const tbody = document.getElementById('list-body');
            document.getElementById('result-count').innerText = `총 ${list.length}건의 신청 내역이 있습니다.`;

            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">조회된 데이터가 없습니다.</td></tr>';
                return;
            }

            let html = '';
            list.forEach(item => {
                // 간단한 KST 포맷팅
                const dateObj = new Date(item.createdAt);
                const kstString = isNaN(dateObj) ? '-' : dateObj.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
                const consentText = item.consent ? 'O (동의)' : 'X';
                
                html += `
                    <tr>
                        <td>${kstString}</td>
                        <td>${item.memberId}</td>
                        <td>${consentText}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function downloadExcel() {
            const date = document.getElementById('search-date').value;
            let url = API_BASE_URL + '/api/event/0429/download';
            if (date) {
                url += '?date=' + encodeURIComponent(date);
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
